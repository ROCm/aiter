baseline:
  aiter_repo: "https://github.com/ROCm/aiter.git"
  aiter_branch: "main"
  triton_repo: "https://github.com/triton-lang/triton.git"
  triton_branch: "main"

target:
  aiter_repo: "https://github.com/ROCm/aiter.git"
  aiter_branch: "feature/new-kernels"
  triton_repo: "https://github.com/triton-lang/triton.git"
  triton_branch: "feature/rocm-improvements"

machines:
  - host: "gpu-node-01.example.com"
    user: "benchuser"
    ssh_key: "/home/ci/.ssh/id_ed25519"
    gpus: [0, 1, 2, 3]
  - host: "gpu-node-02.example.com"
    user: "benchuser"
    ssh_key: "/home/ci/.ssh/id_ed25519"
    gpus: [0]

container:
  image: "rocm/pytorch:latest"
  run_script: "/opt/run_container.sh"

gpu:
  arch: "gfx942"

triton_install:
  command: "pip install -e '.[rocm]'"

tuning:
  mode: "full"
  scout_fraction: 0.15
  thresholds:
    regression_vs_baseline: 3.0
    regression_vs_untuned: 1.5
  timeouts:
    command_default: 600
    tuning_per_shape: 3600
    progress_check: 180
    phase_max: 28800

kernels:
  exclude:
    - "deprecated_kernel_v1"
  include:
    - "flash_attention"
    - "gemm"
  overrides:
    flash_attention:
      m_leq_16_bucket_name: "small_m_bucket"
      extra_block_k: 64
