name: ATOM DI CI smoke workflow

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - ".github/workflows/atom-di-ci-smoke-workflow.yaml"
  workflow_dispatch:
    inputs:
      atom_ref:
        description: "ROCm/ATOM ref containing the mesh Slurm script"
        required: false
        type: string
        default: "main"
      spur_account:
        description: "Spur account"
        required: false
        type: string
        default: "amd-frameworks"
      spur_partition:
        description: "Spur partition or queue"
        required: false
        type: string
        default: "amd-frameworks"
      spur_nodelist:
        description: "Candidate Spur nodes; the 2P1D ATOM script uses the first 3"
        required: false
        type: string
        default: "ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-13,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-14,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-15,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-16"
      model_path:
        description: "DeepSeek-V4-Pro model path visible on Slurm nodes"
        required: false
        type: string
        default: "/mnt/models/DeepSeek-V4-Pro/"
      docker_image:
        description: "ATOM image used by the ATOM mesh script"
        required: false
        type: string
        default: "rocm/atom-dev:latest"
      shared_root:
        description: "Shared root mounted by the ATOM script containers, for example /it-share/..."
        required: false
        type: string
        default: ""
      isl_list:
        description: "Input lengths for the smoke benchmark"
        required: false
        type: string
        default: "8192"
      osl:
        description: "Output length for the smoke benchmark"
        required: false
        type: string
        default: "1"
      conc_list:
        description: "Concurrency list for the smoke benchmark"
        required: false
        type: string
        default: "2"
      run_gsm8k:
        description: "Run GSM8K after the mesh smoke check"
        required: false
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  atomesh-spur-login-smoke:
    runs-on: aiter-di-ci-spur-login
    timeout-minutes: 180
    env:
      ATOM_REF: ${{ inputs.atom_ref }}
      SPUR_ACCOUNT: ${{ inputs.spur_account }}
      SPUR_PARTITION: ${{ inputs.spur_partition }}
      SPUR_NODELIST: ${{ inputs.spur_nodelist }}
      MODEL_PATH: ${{ inputs.model_path }}
      DOCKER_IMAGE: ${{ inputs.docker_image }}
      SHARED_ROOT: ${{ inputs.shared_root }}
      ISL_LIST: ${{ inputs.isl_list }}
      OSL: ${{ inputs.osl }}
      CONC_LIST: ${{ inputs.conc_list }}
      RUN_GSM8K_INPUT: ${{ format('{0}', inputs.run_gsm8k) }}
      RANDOM_RANGE_RATIO: "0.8"
      SCRIPT_PATH: atom/mesh/scripts/ds_v4_2p_tp8_1d_tp8_atom_mtp_dpa_slurm.sh
    steps:
      - name: Show runner and Spur state
        run: |
          set -euo pipefail
          hostname
          whoami
          pwd
          command -v spur
          spur --version || true
          spur --help || true
          spur queue || true

      - name: Checkout ATOM mesh scripts
        uses: actions/checkout@v4
        with:
          repository: ROCm/ATOM
          ref: ${{ env.ATOM_REF || 'main' }}
          path: ATOM

      - name: Set ATOM DI smoke defaults
        run: |
          set -euo pipefail
          {
            echo "SPUR_ACCOUNT=${SPUR_ACCOUNT:-amd-frameworks}"
            echo "SPUR_PARTITION=${SPUR_PARTITION:-amd-frameworks}"
            echo "SPUR_NODELIST=${SPUR_NODELIST:-ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-13,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-14,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-15,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-16}"
            echo "MODEL_PATH=${MODEL_PATH:-/mnt/models/DeepSeek-V4-Pro/}"
            echo "DOCKER_IMAGE=${DOCKER_IMAGE:-rocm/atom-dev:latest}"
            echo "SHARED_ROOT=${SHARED_ROOT:-/it-share/yajizhan/spur_dsv4_logs/aiter_spur_login_${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}}"
            echo "ISL_LIST=${ISL_LIST:-8192}"
            echo "OSL=${OSL:-1}"
            echo "CONC_LIST=${CONC_LIST:-2}"
            if [[ "${RUN_GSM8K_INPUT:-false}" == "true" ]]; then
              echo "RUN_GSM8K=1"
            else
              echo "RUN_GSM8K=0"
            fi
          } >> "${GITHUB_ENV}"

      - name: Prepare shared ATOM source and patched Spur script
        run: |
          set -euo pipefail

          shared_root="${SHARED_ROOT}"
          case "${shared_root}" in
            /it-share/*|/mnt/*|/data/*) ;;
            *)
              echo "shared_root must be under /it-share, /mnt, or /data so Slurm node containers can see the copied ATOM source."
              exit 2
              ;;
          esac

          atom_source="${shared_root}/ATOM"
          log_root="${shared_root}/job"
          script_src="ATOM/${SCRIPT_PATH}"
          script_dst="${shared_root}/$(basename "${SCRIPT_PATH}")"
          shim_dir="${shared_root}/spur-shims"

          test -f "${script_src}"
          mkdir -p "${shared_root}" "${log_root}" "${shim_dir}"
          rm -rf "${atom_source}"
          cp -a ATOM "${atom_source}"

          sed "s|/it-share/yajizhan/code/ATOM|${atom_source}|g" "${script_src}" > "${script_dst}"
          chmod +x "${script_dst}"

          cat > "${shim_dir}/scontrol" <<'SHIM'
          #!/usr/bin/env bash
          set -euo pipefail
          if [[ "${1:-}" == "show" && "${2:-}" == "hostnames" ]]; then
            IFS=',' read -ra nodes <<< "${3:-}"
            printf '%s\n' "${nodes[@]}"
            exit 0
          fi
          echo "Unsupported scontrol invocation: $*" >&2
          exit 2
          SHIM
          chmod +x "${shim_dir}/scontrol"

          cat > "${shim_dir}/srun" <<'SHIM'
          #!/usr/bin/env bash
          set -euo pipefail

          node=""
          time_limit=""
          args=()
          while [[ $# -gt 0 ]]; do
            case "$1" in
              --nodelist=*) node="${1#--nodelist=}" ; shift ;;
              --nodelist) node="${2:-}" ; shift 2 ;;
              --time=*) time_limit="${1#--time=}" ; shift ;;
              --time) time_limit="${2:-}" ; shift 2 ;;
              --nodes=*|--ntasks=*) shift ;;
              --nodes|--ntasks) shift 2 ;;
              *) args+=("$1") ; shift ;;
            esac
          done

          if [[ -z "${node}" ]]; then
            echo "srun shim requires --nodelist" >&2
            exit 2
          fi
          if [[ "${#args[@]}" -eq 0 ]]; then
            echo "srun shim requires a command" >&2
            exit 2
          fi

          spur_args=(run --nodes "${node}")
          if [[ -n "${SPUR_ACCOUNT:-}" ]]; then
            spur_args+=(--account "${SPUR_ACCOUNT}")
          fi
          if [[ -n "${SPUR_PARTITION:-}" ]]; then
            spur_args+=(--partition "${SPUR_PARTITION}")
          fi
          if [[ -n "${time_limit}" ]]; then
            spur_args+=(--time "${time_limit}")
          fi

          exec spur "${spur_args[@]}" -- "${args[@]}"
          SHIM
          chmod +x "${shim_dir}/srun"

          {
            echo "ATOM_SOURCE_FOR_SLURM=${atom_source}"
            echo "LOG_ROOT=${log_root}"
            echo "PATCHED_SCRIPT=${script_dst}"
            echo "SPUR_SHIM_DIR=${shim_dir}"
          } >> "${GITHUB_ENV}"

          echo "Prepared ATOM source: ${atom_source}"
          echo "Prepared patched script: ${script_dst}"
          echo "Prepared Spur shim dir: ${shim_dir}"
          sed -n '1,80p' "${script_dst}"

      - name: Run DeepSeek-V4-Pro 2P1D ATOM mesh smoke job with Spur
        run: |
          set -euo pipefail

          echo "Running ${PATCHED_SCRIPT}"
          echo "Shared root: ${SHARED_ROOT}"
          IFS=',' read -ra candidate_nodes <<< "${SPUR_NODELIST}"
          if [[ "${#candidate_nodes[@]}" -lt 3 ]]; then
            echo "Need at least 3 Spur nodes for the ATOM 2P1D script; got: ${SPUR_NODELIST}"
            exit 2
          fi
          atom_mesh_nodelist="${candidate_nodes[0]},${candidate_nodes[1]},${candidate_nodes[2]}"

          echo "Spur candidate nodes: ${SPUR_NODELIST}"
          echo "ATOM 2P1D nodes: ${atom_mesh_nodelist}"
          echo "Model path: ${MODEL_PATH}"
          echo "Docker image: ${DOCKER_IMAGE}"
          echo "ISL/OSL/CONC: ${ISL_LIST}/${OSL}/${CONC_LIST}"
          echo "RUN_GSM8K=${RUN_GSM8K}"

          set +e
          spur_output="$(
            SLURM_JOB_ID="${GITHUB_RUN_ID}_${GITHUB_RUN_ATTEMPT}" \
            SLURM_JOB_NODELIST="${atom_mesh_nodelist}" \
            PATH="${SPUR_SHIM_DIR}:${PATH}" \
            bash "${PATCHED_SCRIPT}" 2>&1
          )"
          spur_status=$?
          set -e

          echo "${spur_output}"
          echo "SPUR_STATUS=${spur_status}" >> "${GITHUB_ENV}"

          echo "=== Spur logs ==="
          find "${SHARED_ROOT}" -maxdepth 3 -type f \( -name "*.out" -o -name "*.err" -o -name "*.log" \) -print -exec tail -n 240 {} \; || true

          echo "=== ATOM mesh result files ==="
          find "${LOG_ROOT}" -maxdepth 4 -type f \( -name "*.json" -o -name "*.log" -o -name "*.out" -o -name "*.err" \) -print | sort || true

          exit "${spur_status}"

      - name: Collect ATOMesh smoke logs
        if: always()
        run: |
          set -euo pipefail
          artifact_dir="atom-di-ci-smoke-artifacts"
          rm -rf "${artifact_dir}"
          mkdir -p "${artifact_dir}"

          if [[ -n "${SHARED_ROOT:-}" && -d "${SHARED_ROOT}" ]]; then
            tar -C "${SHARED_ROOT}" -cf "${artifact_dir}/atom-di-ci-smoke-logs.tar" .
          else
            {
              echo "No shared log root was available."
              echo "SHARED_ROOT=${SHARED_ROOT:-}"
            } > "${artifact_dir}/README.txt"
          fi

      - name: Upload ATOMesh smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atomesh-spur-login-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: atom-di-ci-smoke-artifacts/
