name: ATOM DI CI smoke workflow

on:
  schedule:
    - cron: "0 16 * * *"  # 12:00 AM Beijing Time (UTC+8)
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - ".github/workflows/atom-di-ci-smoke-workflow.yaml"
      - ".github/actionlint.yaml"
  workflow_dispatch:
    inputs:
      atom_ref:
        description: "ROCm/ATOM ref with ATOMesh Spur support"
        required: false
        type: string
        default: "main"
      atomesh_image:
        description: "ATOM image used by the ATOMesh benchmark"
        required: false
        type: string
        default: "rocm/atom-dev:latest"
      model_path:
        description: "DeepSeek-V4-Pro model path visible on Spur nodes"
        required: false
        type: string
        default: "/data/models2/DeepSeek-V4-Pro"
      glm_5_2_fp8_model_path:
        description: "GLM-5.2-FP8 model path visible on Spur nodes"
        required: false
        type: string
        default: "/data/models2/GLM-5.2-FP8"
      run_glm_5_2_fp8:
        description: "Run GLM-5.2-FP8 2P1D TP-only case"
        required: false
        default: false
        type: boolean
      log_root:
        description: "Root directory for ATOMesh logs"
        required: false
        type: string
        default: "/data/xinhuang/spur_dsv4_logs"
      shared_workspace_root:
        description: "Shared workspace root visible on Spur nodes"
        required: false
        type: string
        default: "/data/xinhuang/atomesh-ci"
      spur_nodelist:
        description: "Optional comma-separated Spur nodes; empty lets Spur allocate"
        required: false
        type: string
        default: "ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-1,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-7,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-16"
      conc_list:
        description: "Concurrency list for the smoke benchmark"
        required: false
        type: string
        default: "2"
      eval_conc_list:
        description: "Concurrency list for GSM8K eval; empty uses benchmark concurrency"
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ATOM_REF_DEFAULT: main
  ATOMESH_IMAGE_DEFAULT: rocm/atom-dev:latest
  ATOMESH_MODEL_PATH_DEEPSEEK_V4_PRO_DEFAULT: /data/models2/DeepSeek-V4-Pro
  ATOMESH_MODEL_PATH_GLM_5_2_FP8_DEFAULT: /data/models2/GLM-5.2-FP8
  ATOMESH_LOG_ROOT_DEFAULT: /data/xinhuang/spur_dsv4_logs
  ATOMESH_SHARED_WORKSPACE_ROOT_DEFAULT: /data/xinhuang/atomesh-ci
  ATOMESH_2P1D_NODES_DEFAULT: ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-1,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-7,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-16
  ISL_LIST_DEFAULT: "8192"
  OSL_DEFAULT: "1"
  CONC_LIST_DEFAULT: "2"
  GLM_OSL_DEFAULT: "1024"
  GLM_CONC_LIST_DEFAULT: "128,256"
  GLM_EVAL_CONC_LIST_DEFAULT: "64,256"
  ATOMESH_SLURM_SUBMIT_RUNNER: aiter-di-ci-spur-login
  ATOMESH_SLURM_ACCOUNT: ""
  ATOMESH_SLURM_PARTITION: ""
  ATOMESH_MODEL_ROOT: /data/models2
  ATOMESH_1P1D_NODES: ""

jobs:
  load-config:
    runs-on: ubuntu-latest
    outputs:
      cell_id: ${{ steps.cell.outputs.cell_id }}
    steps:
      - name: Apply ATOM DI smoke inputs
        run: |
          set -euo pipefail
          python3 - "$GITHUB_EVENT_PATH" <<'PY' >> "$GITHUB_ENV"
          import json
          import os
          import sys

          with open(sys.argv[1], encoding="utf-8") as f:
              event = json.load(f)

          inputs = event.get("inputs") or {}

          def value(name: str, default_env: str) -> str:
              raw = inputs.get(name, "")
              default = os.environ[default_env]
              return raw if raw not in ("", None) else default

          def bool_input(name: str, default: bool = False) -> bool:
              raw = inputs.get(name, "")
              if raw in ("", None):
                  return default
              if isinstance(raw, bool):
                  return raw
              return str(raw).lower() == "true"

          run_glm = bool_input("run_glm_5_2_fp8", False)

          print(f"ATOM_REF={value('atom_ref', 'ATOM_REF_DEFAULT')}")
          print(f"ATOMESH_IMAGE={value('atomesh_image', 'ATOMESH_IMAGE_DEFAULT')}")
          print(
              "ATOMESH_MODEL_PATH_DEEPSEEK_V4_PRO="
              + value("model_path", "ATOMESH_MODEL_PATH_DEEPSEEK_V4_PRO_DEFAULT")
          )
          print(
              "ATOMESH_MODEL_PATH_GLM_5_2_FP8="
              + value("glm_5_2_fp8_model_path", "ATOMESH_MODEL_PATH_GLM_5_2_FP8_DEFAULT")
          )
          print(f"RUN_GLM_5_2_FP8={str(run_glm).lower()}")
          print(f"ATOMESH_LOG_ROOT={value('log_root', 'ATOMESH_LOG_ROOT_DEFAULT')}")
          print(
              "ATOMESH_SHARED_WORKSPACE_ROOT="
              + value("shared_workspace_root", "ATOMESH_SHARED_WORKSPACE_ROOT_DEFAULT")
          )
          node_list = value("spur_nodelist", "ATOMESH_2P1D_NODES_DEFAULT")
          nodes = [node.strip() for node in node_list.split(",") if node.strip()]
          print(f"ATOMESH_2P1D_NODES={node_list}")
          print(f"ATOMESH_1P1D_NODES={','.join(nodes[:2])}")
          print(f"ISL_LIST={value('isl_list', 'ISL_LIST_DEFAULT')}")
          print(
              "OSL="
              + value("osl", "GLM_OSL_DEFAULT" if run_glm else "OSL_DEFAULT")
          )
          print(
              "CONC_LIST="
              + value("conc_list", "GLM_CONC_LIST_DEFAULT" if run_glm else "CONC_LIST_DEFAULT")
          )
          eval_conc = inputs.get("eval_conc_list", "")
          if eval_conc in ("", None):
              eval_conc = (
                  os.environ["GLM_EVAL_CONC_LIST_DEFAULT"]
                  if run_glm
                  else value("conc_list", "CONC_LIST_DEFAULT")
              )
          print(f"EVAL_CONC_LIST={eval_conc}")
          PY

      - name: Checkout ATOM source
        uses: actions/checkout@v4
        with:
          repository: ROCm/ATOM
          ref: main
          path: ATOM

      - name: Select ATOM ref
        run: |
          set -euo pipefail
          cd ATOM
          if [[ "${ATOM_REF}" != "main" ]]; then
            git fetch --depth=1 origin "${ATOM_REF}"
            git checkout FETCH_HEAD
          fi
          git rev-parse HEAD

      - name: Patch ATOMesh Spur submit runner label
        run: |
          set -euo pipefail
          cd ATOM
          python3 - <<'PY'
          from pathlib import Path

          old = "atomesh-cicd-mi350"
          new = "aiter-di-ci-spur-login"
          paths = [
              Path(".github/scripts/atomesh/pd_matrix.py"),
              Path(".github/scripts/atomesh/pd_submit.sh"),
              Path(".github/workflows/atomesh-benchmark.yaml"),
          ]

          for path in paths:
              text = path.read_text(encoding="utf-8")
              count = text.count(old)
              path.write_text(text.replace(old, new), encoding="utf-8")
              print(f"{path}: replaced {count} occurrence(s)")

          remaining = []
          for path in paths:
              if old in path.read_text(encoding="utf-8"):
                  remaining.append(str(path))

          if remaining:
              raise SystemExit(
                  "Failed to replace all ATOMesh Spur runner labels in: "
                  + ", ".join(remaining)
              )

          server_path = Path(".github/scripts/atomesh/pd_server_atom.sh")
          text = server_path.read_text(encoding="utf-8")
          sync_old = 'apply_prefixed_env "ATOMESH_ENV_" "${host_ip}"\n'
          sync_new = (
              'apply_prefixed_env "ATOMESH_ENV_" "${host_ip}"\n'
              'ATOM_PD_RANK_MAPPING_POLICY="${ATOMESH_ENV_ATOM_PD_RANK_MAPPING_POLICY:-${ATOM_PD_RANK_MAPPING_POLICY}}"\n'
          )
          if sync_new not in text:
              if sync_old not in text:
                  raise SystemExit("Failed to find ATOMESH_ENV apply point")
              text = text.replace(sync_old, sync_new, 1)

          policy_old = '    --policy "${ROUTER_POLICY}"\n'
          policy_new = (
              '    --policy "${ROUTER_POLICY}"\n'
              '    --dp-aware\n'
              '    --atom-pd-rank-mapping-policy "${ATOM_PD_RANK_MAPPING_POLICY}"\n'
          )
          if policy_new not in text:
              if policy_old not in text:
                  raise SystemExit("Failed to find router policy argument")
              text = text.replace(policy_old, policy_new, 1)

          server_path.write_text(text, encoding="utf-8")
          print(f"{server_path}: patched ATOM PD rank mapping policy argument")

          router_path = Path("atom/mesh/src/routers/http_pd_router.rs")
          text = router_path.read_text(encoding="utf-8")
          rank_patch = """                        if let Some(prefill_dp_rank) = prefill.dp_rank() {
                            if let Some(obj) = prefill_request_json.as_object_mut() {
                                obj.insert(
                                    "data_parallel_rank".to_string(),
                                    serde_json::json!(prefill_dp_rank),
                                );
                            }
                        }
                        if let Some(decode_dp_rank) = decode.dp_rank() {
                            if let Some(obj) = decode_request_json.as_object_mut() {
                                obj.insert(
                                    "data_parallel_rank".to_string(),
                                    serde_json::json!(decode_dp_rank),
                                );
                            }
                        }
          """
          marker = "                        let correlation_id = self.adapter.correlation_id(&ctx);\n"
          anchor = "                        let mut decode_request_json = prefill_request_json.clone();\n"
          if rank_patch not in text:
              anchor_pos = text.find(anchor)
              if anchor_pos < 0:
                  raise SystemExit("Failed to find ATOM relay decode request anchor")
              marker_pos = text.find(marker, anchor_pos)
              if marker_pos < 0:
                  raise SystemExit("Failed to find ATOM relay correlation_id marker")
              text = text[:marker_pos] + rank_patch + text[marker_pos:]
          router_path.write_text(text, encoding="utf-8")
          print(f"{router_path}: patched explicit ATOM PD data_parallel_rank injection")
          PY

      - name: Install matrix dependencies
        run: python3 -m pip install pyyaml

      - name: Build ATOMesh benchmark cell
        id: cell
        run: |
          set -euo pipefail
          cd ATOM
          model_name="DeepSeek-V4-Pro"
          target_topology="2p1d_dpa"
          if [[ "${RUN_GLM_5_2_FP8}" == "true" ]]; then
            model_name="GLM-5.2-FP8"
            target_topology="2p1d"
          fi

          python3 .github/scripts/atomesh/pd_matrix.py \
            --suite nightly \
            --model "${model_name}" \
            --image "${ATOMESH_IMAGE}" \
            --benchmark-concurrency "${CONC_LIST}" \
            --eval-concurrency "${EVAL_CONC_LIST}" \
            --output ../atomesh-matrix.json

          python3 - "${model_name}" "${target_topology}" <<'PY'
          import json
          import os
          import sys
          from pathlib import Path

          model_name, target_topology = sys.argv[1:3]
          matrix_path = Path("../atomesh-matrix.json")
          matrix = json.loads(matrix_path.read_text(encoding="utf-8"))
          cells = [
              cell
              for cell in matrix.get("include", [])
              if cell.get("model") == model_name
              and cell.get("topology") == target_topology
          ]
          if not cells:
              raise SystemExit(f"No {model_name} {target_topology} cell was generated")

          cell = cells[0]
          isl = [
              int(item)
              for item in os.environ["ISL_LIST"].replace(",", " ").split()
              if item
          ]
          conc = [
              int(item)
              for item in os.environ["CONC_LIST"].replace(",", " ").split()
              if item
          ]
          cell["isl"] = isl
          cell["osl"] = int(os.environ["OSL"])
          cell["concurrency"] = conc
          cell["concurrency_x"] = "x".join(str(value) for value in conc)
          if model_name == "DeepSeek-V4-Pro":
              cell["run_eval"] = False
          cell["accuracy"]["concurrency"] = [
              int(item)
              for item in os.environ["EVAL_CONC_LIST"].replace(",", " ").split()
              if item
          ]
          cell["runner"]["slurm_submit_runner"] = "aiter-di-ci-spur-login"
          cell["runner"]["slurm_account"] = ""
          cell["runner"]["slurm_partition"] = ""
          cell["runner"]["log_root"] = os.environ["ATOMESH_LOG_ROOT"]

          node_list = [
              node.strip()
              for node in os.environ.get("ATOMESH_2P1D_NODES", "").split(",")
              if node.strip()
          ]
          required_nodes = int(cell["num_nodes"])
          if node_list:
              if len(node_list) < required_nodes:
                  raise SystemExit(
                      f"Need {required_nodes} nodes, got {len(node_list)}: {node_list}"
                  )
              cell["nodes"] = node_list[:required_nodes]

          cell_env = cell.setdefault("env", {})
          for scope in ("common", "prefill", "decode"):
              cell_env.setdefault(scope, {})["ATOM_PD_RANK_MAPPING_POLICY"] = "idx2idx"

          Path("../atomesh-cell.json").write_text(
              json.dumps(cell, indent=2),
              encoding="utf-8",
          )
          print(json.dumps(cell, indent=2))

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"cell_id={cell['id']}\n")
          PY

      - name: Package patched ATOM source
        run: tar -C ATOM -czf atom-source.tar.gz .

      - name: Upload ATOMesh smoke config
        uses: actions/upload-artifact@v4
        with:
          name: atom-di-ci-smoke-config
          path: |
            atomesh-cell.json
            atomesh-matrix.json
            atom-source.tar.gz

  atom-di-ci-smoke:
    needs: [load-config]
    runs-on: [self-hosted, aiter-di-ci-spur-login]
    timeout-minutes: 420
    env:
      ATOMESH_SHARED_WORKSPACE_ROOT: /data/xinhuang/atomesh-ci
    steps:
      - name: Show runner and Spur-compatible Slurm state
        run: |
          set -euo pipefail
          hostname
          whoami
          pwd
          command -v sbatch
          sbatch --help | head -80 || true
          command -v squeue
          squeue --help | head -80 || true
          command -v scancel
          command -v spur && spur --help | head -120 || true

      - name: Download ATOMesh smoke config
        uses: actions/download-artifact@v4
        with:
          name: atom-di-ci-smoke-config

      - name: Unpack patched ATOM source
        run: |
          set -euo pipefail
          rm -rf ATOM
          mkdir -p ATOM
          tar -C ATOM -xzf atom-source.tar.gz

      - name: Run ATOMesh benchmark cell
        run: |
          set -euo pipefail
          original_workspace="${GITHUB_WORKSPACE}"
          result_dir="${original_workspace}/atomesh-results"
          mkdir -p "${result_dir}"

          cell_id="$(
            python3 -c 'import json; print(json.load(open("atomesh-cell.json"))["id"])'
          )"
          shared_workspace="${ATOMESH_SHARED_WORKSPACE_ROOT%/}/${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}/${cell_id}"
          mkdir -p "${shared_workspace}"

          tar -C "${original_workspace}/ATOM" -cf - . | tar \
            --no-same-owner \
            --no-same-permissions \
            -C "${shared_workspace}" \
            -xf -

          cd "${shared_workspace}"
          chmod +x .github/scripts/atomesh/*.sh .github/scripts/atomesh/*.py

          cancel_helper="${result_dir}/${cell_id}.slurm-cancel.sh"
          cancel_slurm_from_wrapper() {
            local rc=$?
            if [[ "${rc}" -ne 0 && -x "${cancel_helper}" ]]; then
              echo "=== cancelling ATOMesh job from workflow wrapper rc=${rc} ==="
              bash "${cancel_helper}" || true
            fi
            exit "${rc}"
          }
          trap cancel_slurm_from_wrapper EXIT
          trap 'exit 130' INT
          trap 'exit 143' TERM

          bash .github/scripts/atomesh/pd_submit.sh \
            --cell-json "$(cat "${original_workspace}/atomesh-cell.json")" \
            --result-dir "${result_dir}"

      - name: Summarize ATOMesh smoke result
        if: always()
        run: |
          set -euo pipefail
          cd ATOM
          mkdir -p ../atomesh-results
          if [ -f ../atomesh-cell.json ]; then
            cell_id="$(
              python3 -c 'import json; print(json.load(open("../atomesh-cell.json"))["id"])'
            )"
            summary="../atomesh-results/${cell_id}-summary.md"
            output="../atomesh-results/${cell_id}-benchmark-action.json"
            python3 .github/scripts/atomesh/process_result.py \
              "../atomesh-results/${cell_id}" \
              --output "${output}" \
              --summary "${summary}" \
              --run-url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" || true
            if [ -f "${summary}" ]; then
              cat "${summary}" >> "${GITHUB_STEP_SUMMARY}"
              cat "${summary}"
            fi
          fi

      - name: Upload ATOMesh smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atom-di-ci-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            atomesh-cell.json
            atomesh-matrix.json
            atomesh-results/
