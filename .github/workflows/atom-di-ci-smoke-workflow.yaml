name: ATOM DI CI smoke workflow

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - ".github/workflows/atom-di-ci-smoke-workflow.yaml"
      - ".github/scripts/atom-di-ci/**"
  workflow_dispatch:
    inputs:
      spur_account:
        description: "Spur account"
        required: false
        type: string
        default: "amd-frameworks"
      spur_partition:
        description: "Spur partition or queue"
        required: false
        type: string
        default: "default"
      spur_nodelist:
        description: "Candidate Spur nodes; the 2P1D smoke uses the first 3"
        required: false
        type: string
        default: "ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-13,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-14,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-15,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-16"
      model_path:
        description: "DeepSeek-V4-Pro model path visible on Spur nodes"
        required: false
        type: string
        default: "/data/models2/DeepSeek-V4-Pro"
      docker_image:
        description: "ATOM image used by the AITER CI scripts"
        required: false
        type: string
        default: "rocm/atom-dev:latest"
      shared_root:
        description: "Shared /data root for scripts, logs, and results"
        required: false
        type: string
        default: ""

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  atomesh-spur-login-smoke:
    runs-on: [self-hosted, aiter-di-ci-spur-login]
    timeout-minutes: 180
    env:
      SPUR_ACCOUNT: amd-frameworks
      SPUR_PARTITION: default
      SPUR_NODELIST: ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-13,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-14,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-15,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-16
      MODEL_PATH: /data/models2/DeepSeek-V4-Pro
      DOCKER_IMAGE: rocm/atom-dev:latest
      SHARED_ROOT_BASE: /data/xinhuang/spur_dsv4_logs
      AITER_CI_SUBMIT_MODE: spur-script
      AITER_CI_USE_NODELIST: "1"
    steps:
      - name: Show runner and Spur state
        run: |
          set -euo pipefail
          hostname
          whoami
          pwd
          command -v sbatch
          sbatch --help | sed -n '1,80p' || true
          command -v spur || true
          spur --version || true
          spur --help || true
          spur queue || true

      - name: Apply ATOM DI smoke inputs
        run: |
          set -euo pipefail
          python3 - "$GITHUB_EVENT_PATH" <<'PY' >> "$GITHUB_ENV"
          import json
          import os
          import sys

          event_path = sys.argv[1]
          with open(event_path, encoding="utf-8") as f:
              event = json.load(f)

          inputs = event.get("inputs") or {}
          defaults = {
              "SPUR_ACCOUNT": "amd-frameworks",
              "SPUR_PARTITION": "default",
              "SPUR_NODELIST": "ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-13,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-14,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-15,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-16",
              "MODEL_PATH": "/data/models2/DeepSeek-V4-Pro",
              "DOCKER_IMAGE": "rocm/atom-dev:latest",
          }
          input_names = {
              "SPUR_ACCOUNT": "spur_account",
              "SPUR_PARTITION": "spur_partition",
              "SPUR_NODELIST": "spur_nodelist",
              "MODEL_PATH": "model_path",
              "DOCKER_IMAGE": "docker_image",
          }

          for env_name, default in defaults.items():
              raw = inputs.get(input_names[env_name], "")
              value = raw if raw not in ("", None) else default
              print(f"{env_name}={value}")

          shared_root = inputs.get("shared_root") or ""
          if not shared_root:
              run_id = os.environ["GITHUB_RUN_ID"]
              run_attempt = os.environ["GITHUB_RUN_ATTEMPT"]
              shared_root = f"/data/xinhuang/spur_dsv4_logs/aiter_spur_login_{run_id}_{run_attempt}"

          print(f"SHARED_ROOT={shared_root}")
          print(f"AITER_CI_LOG_ROOT={shared_root}/logs")
          print(f"AITER_CI_RESULT_DIR={shared_root}/results")
          print(f"AITER_CI_SHARED_SCRIPT_ROOT={shared_root}/scripts")
          PY

      - name: Checkout AITER scripts
        uses: actions/checkout@v4

      - name: Prepare shared AITER CI scripts
        run: |
          set -euo pipefail

          case "${SHARED_ROOT}" in
            /data/*) ;;
            *)
              echo "shared_root must be under /data so Spur compute nodes can see scripts and logs."
              exit 2
              ;;
          esac

          mkdir -p "${AITER_CI_SHARED_SCRIPT_ROOT}" "${AITER_CI_LOG_ROOT}" "${AITER_CI_RESULT_DIR}"
          cp -R --no-preserve=mode,ownership,timestamps .github/scripts/atom-di-ci/. "${AITER_CI_SHARED_SCRIPT_ROOT}/"
          chmod +x "${AITER_CI_SHARED_SCRIPT_ROOT}"/*.sh
          find "${AITER_CI_SHARED_SCRIPT_ROOT}" -maxdepth 1 -type f -printf "%f %s bytes\n" | sort

      - name: Generate AITER CI 2P1D smoke cell
        run: |
          set -euo pipefail

          cell_json="${AITER_CI_RESULT_DIR}/cell.json"
          nodes="$(echo "${SPUR_NODELIST}" | cut -d, -f1,2,3)"

          python3 - "${cell_json}" "${nodes}" <<'PY'
          import json
          import os
          import sys

          cell_path, raw_nodes = sys.argv[1:3]
          nodes = [node.strip() for node in raw_nodes.split(",") if node.strip()]
          if len(nodes) != 3:
              raise SystemExit(f"Expected exactly 3 nodes for 2P1D smoke, got {nodes}")

          cell = {
              "id": "deepseek-v4-pro-2p1d-dpa-gsm8k",
              "model": "DeepSeek-V4-Pro",
              "backend": "atom",
              "image": os.environ["DOCKER_IMAGE"],
              "model_path": os.environ["MODEL_PATH"],
              "precision": "FP4",
              "topology": "2p1d",
              "display_topology": "2P1D-TP8-DPA",
              "nodes": nodes,
              "num_nodes": 3,
              "isl": [8192],
              "osl": 1024,
              "concurrency": [64],
              "concurrency_x": "64",
              "random_range_ratio": "0.8",
              "request_rate": "inf",
              "num_prompts_multiplier": 10,
              "wait_server_timeout": 2500,
              "wait_router_timeout": 300,
              "runner": {
                  "slurm_account": os.environ.get("SPUR_ACCOUNT", ""),
                  "slurm_partition": os.environ.get("SPUR_PARTITION", "default"),
                  "gpus_per_node": 8,
                  "cpus_per_task": 1,
                  "time_limit": "08:00:00",
                  "log_root": os.environ["AITER_CI_LOG_ROOT"],
              },
              "service": {
                  "prefill": {
                      "port": 8010,
                      "workers": 2,
                      "tp": 8,
                      "enable_dp_attention": True,
                  },
                  "decode": {
                      "port": 8020,
                      "workers": 1,
                      "tp": 8,
                      "enable_dp_attention": True,
                  },
                  "router": {"port": 8000, "policy": "random", "prometheus_port": 29100},
              },
              "server_args": {
                  "kv_cache_dtype": "fp8",
                  "block_size": 16,
                  "gpu_memory_utilization": 0.85,
                  "max_num_seqs": 256,
              },
              "env": {
                  "common": {
                      "PYTHONUNBUFFERED": "1",
                      "AITER_LOG_LEVEL": "WARNING",
                      "AITER_BF16_FP8_MOE_BOUND": "0",
                      "ATOM_MOE_GU_ITLV": "1",
                      "GPU_MAX_HW_QUEUES": "5",
                      "ATOM_CPU_AFFINITY": "1",
                  },
                  "prefill": {"ATOM_HOST_IP": "${ROLE_IP}"},
                  "decode": {"ATOM_HOST_IP": "${ROLE_IP}"},
              },
              "run_eval": True,
              "run_benchmark": False,
              "accuracy": {
                  "task": "gsm8k",
                  "fewshot": 3,
                  "limit": None,
                  "concurrency": [64],
              },
          }
          with open(cell_path, "w", encoding="utf-8") as f:
              json.dump(cell, f, indent=2)
          print(json.dumps({
              "id": cell["id"],
              "nodes": cell["nodes"],
              "model_path": cell["model_path"],
              "image": cell["image"],
              "eval_concurrency": cell["accuracy"]["concurrency"],
          }, indent=2))
          PY

          echo "AITER_CI_CELL_JSON=${cell_json}" >> "${GITHUB_ENV}"

      - name: Run DeepSeek-V4-Pro 2P1D AITER CI smoke job with Spur
        run: |
          set -euo pipefail
          cd "${AITER_CI_SHARED_SCRIPT_ROOT}"

          AITER_CI_SUBMIT_MODE="${AITER_CI_SUBMIT_MODE}" \
          AITER_CI_USE_NODELIST="${AITER_CI_USE_NODELIST}" \
          ./pd_spur_submit.sh \
            --cell-json "${AITER_CI_CELL_JSON}" \
            --result-dir "${AITER_CI_RESULT_DIR}" \
            --scripts-root "${AITER_CI_SHARED_SCRIPT_ROOT}"

      - name: Collect ATOMesh smoke logs
        if: always()
        run: |
          set -euo pipefail
          artifact_dir="atom-di-ci-smoke-artifacts"
          rm -rf "${artifact_dir}"
          mkdir -p "${artifact_dir}"

          if [[ -n "${SHARED_ROOT:-}" && -d "${SHARED_ROOT}" ]]; then
            tar -C "${SHARED_ROOT}" -cf "${artifact_dir}/atom-di-ci-smoke-logs.tar" .
          else
            {
              echo "No shared log root was available."
              echo "SHARED_ROOT=${SHARED_ROOT:-}"
            } > "${artifact_dir}/README.txt"
          fi

      - name: Upload ATOMesh smoke logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atomesh-spur-login-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: atom-di-ci-smoke-artifacts/
