name: ATOM DI CI smoke workflow

on:
  schedule:
    - cron: "0 16 * * *"  # 12:00 AM Beijing Time (UTC+8)
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - ".github/workflows/atom-di-ci-smoke-workflow.yaml"
      - ".github/actionlint.yaml"
  workflow_dispatch:
    inputs:
      atom_ref:
        description: "ROCm/ATOM ref with PR #1475 ATOMesh Spur support"
        required: false
        type: string
        default: "zwan/mesh-model-ci-spur"
      atomesh_image:
        description: "ATOM image used by the ATOMesh benchmark"
        required: false
        type: string
        default: "rocm/atom-dev:latest"
      model_path:
        description: "DeepSeek-V4-Pro model path visible on Spur nodes"
        required: false
        type: string
        default: "/data/models2/DeepSeek-V4-Pro"
      log_root:
        description: "Root directory for ATOMesh logs"
        required: false
        type: string
        default: "/data/xinhuang/spur_dsv4_logs"
      shared_workspace_root:
        description: "Shared workspace root visible on Spur nodes"
        required: false
        type: string
        default: "/data/xinhuang/atomesh-ci"
      spur_nodelist:
        description: "Optional comma-separated Spur nodes; empty lets Spur allocate"
        required: false
        type: string
        default: "ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-13,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-14,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-15"
      isl_list:
        description: "Input lengths for the smoke benchmark"
        required: false
        type: string
        default: "8192"
      osl:
        description: "Output length for the smoke benchmark"
        required: false
        type: string
        default: "1"
      conc_list:
        description: "Concurrency list for the smoke benchmark"
        required: false
        type: string
        default: "2"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  atom-di-ci-smoke:
    runs-on: [self-hosted, aiter-di-ci-spur-login]
    timeout-minutes: 420
    env:
      ATOM_REF: zwan/mesh-model-ci-spur
      ATOMESH_IMAGE: rocm/atom-dev:latest
      ATOMESH_MODEL_PATH_DEEPSEEK_V4_PRO: /data/models2/DeepSeek-V4-Pro
      ATOMESH_LOG_ROOT: /data/xinhuang/spur_dsv4_logs
      ATOMESH_SHARED_WORKSPACE_ROOT: /data/xinhuang/atomesh-ci
      ATOMESH_SLURM_SUBMIT_RUNNER: aiter-di-ci-spur-login
      ATOMESH_SLURM_ACCOUNT: ""
      ATOMESH_SLURM_PARTITION: ""
      ATOMESH_MODEL_ROOT: /data/models2
      ATOMESH_1P1D_NODES: ""
      ATOMESH_2P1D_NODES: ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-13,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-14,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-15
      ISL_LIST: "8192"
      OSL: "1"
      CONC_LIST: "2"
    steps:
      - name: Show runner and Spur-compatible Slurm state
        run: |
          set -euo pipefail
          hostname
          whoami
          pwd
          command -v sbatch
          sbatch --version || true
          command -v squeue
          squeue --help | head -80 || true
          command -v scancel
          command -v spur && spur --help | head -120 || true

      - name: Apply ATOM DI smoke inputs
        run: |
          set -euo pipefail
          python3 - "$GITHUB_EVENT_PATH" <<'PY' >> "$GITHUB_ENV"
          import json
          import os
          import sys

          with open(sys.argv[1], encoding="utf-8") as f:
              event = json.load(f)

          inputs = event.get("inputs") or {}

          def value(name: str, default: str) -> str:
              raw = inputs.get(name, "")
              return raw if raw not in ("", None) else default

          atom_ref = value("atom_ref", "zwan/mesh-model-ci-spur")
          image = value("atomesh_image", "rocm/atom-dev:latest")
          model_path = value("model_path", "/data/models2/DeepSeek-V4-Pro")
          log_root = value("log_root", "/data/xinhuang/spur_dsv4_logs")
          shared_workspace_root = value(
              "shared_workspace_root", "/data/xinhuang/atomesh-ci"
          )
          node_list = value(
              "spur_nodelist",
              "ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-13,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-14,ml-ai-ubuntu-gpu-mi350x8-2304gb-fabric-15",
          )
          isl_list = value("isl_list", "8192")
          osl = value("osl", "1")
          conc_list = value("conc_list", "2")

          print(f"ATOM_REF={atom_ref}")
          print(f"ATOMESH_IMAGE={image}")
          print(f"ATOMESH_MODEL_PATH_DEEPSEEK_V4_PRO={model_path}")
          print(f"ATOMESH_LOG_ROOT={log_root}")
          print(f"ATOMESH_SHARED_WORKSPACE_ROOT={shared_workspace_root}")
          print(f"ATOMESH_2P1D_NODES={node_list}")
          print(f"ISL_LIST={isl_list}")
          print(f"OSL={osl}")
          print(f"CONC_LIST={conc_list}")
          PY

      - name: Checkout ATOM PR 1475 source
        uses: actions/checkout@v4
        with:
          repository: ROCm/ATOM
          ref: main
          path: ATOM

      - name: Select ATOM ref
        run: |
          set -euo pipefail
          cd ATOM
          if [[ "${ATOM_REF}" != "main" ]]; then
            git fetch --depth=1 origin "${ATOM_REF}"
            git checkout FETCH_HEAD
          fi
          git rev-parse HEAD

      - name: Patch ATOMesh submit runner label
        run: |
          set -euo pipefail
          cd ATOM
          python3 - <<'PY'
          from pathlib import Path

          for rel in (
              ".github/scripts/atomesh/pd_matrix.py",
              ".github/scripts/atomesh/pd_submit.sh",
              ".github/workflows/atomesh-benchmark.yaml",
          ):
              path = Path(rel)
              text = path.read_text(encoding="utf-8")
              text = text.replace("atomesh-cicd-mi350", "aiter-di-ci-spur-login")
              path.write_text(text, encoding="utf-8")
          PY
          rg -n "atomesh-cicd-mi350|aiter-di-ci-spur-login" \
            .github/scripts/atomesh/pd_matrix.py \
            .github/scripts/atomesh/pd_submit.sh \
            .github/workflows/atomesh-benchmark.yaml

      - name: Install matrix dependencies
        run: python3 -m pip install pyyaml

      - name: Build DeepSeek-V4-Pro 2P1D benchmark cell
        run: |
          set -euo pipefail
          cd ATOM
          python3 .github/scripts/atomesh/pd_matrix.py \
            --suite nightly \
            --model DeepSeek-V4-Pro \
            --image "${ATOMESH_IMAGE}" \
            --benchmark-concurrency "${CONC_LIST}" \
            --eval-concurrency "${CONC_LIST}" \
            --output ../atomesh-matrix.json

          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          matrix_path = Path("../atomesh-matrix.json")
          matrix = json.loads(matrix_path.read_text(encoding="utf-8"))
          cells = [
              cell
              for cell in matrix.get("include", [])
              if cell.get("model") == "DeepSeek-V4-Pro"
              and cell.get("topology") == "2p1d_dpa"
          ]
          if not cells:
              raise SystemExit("No DeepSeek-V4-Pro 2p1d_dpa cell was generated")

          cell = cells[0]
          isl = [
              int(item)
              for item in os.environ["ISL_LIST"].replace(",", " ").split()
              if item
          ]
          conc = [
              int(item)
              for item in os.environ["CONC_LIST"].replace(",", " ").split()
              if item
          ]
          cell["isl"] = isl
          cell["osl"] = int(os.environ["OSL"])
          cell["concurrency"] = conc
          cell["concurrency_x"] = "x".join(str(value) for value in conc)
          cell["run_eval"] = False
          cell["accuracy"]["concurrency"] = conc
          cell["runner"]["slurm_submit_runner"] = "aiter-di-ci-spur-login"
          cell["runner"]["slurm_account"] = ""
          cell["runner"]["slurm_partition"] = ""
          cell["runner"]["log_root"] = os.environ["ATOMESH_LOG_ROOT"]

          node_list = [
              node.strip()
              for node in os.environ.get("ATOMESH_2P1D_NODES", "").split(",")
              if node.strip()
          ]
          required_nodes = int(cell["num_nodes"])
          if node_list:
              if len(node_list) < required_nodes:
                  raise SystemExit(
                      f"Need {required_nodes} nodes, got {len(node_list)}: {node_list}"
                  )
              cell["nodes"] = node_list[:required_nodes]

          Path("../atomesh-cell.json").write_text(
              json.dumps(cell, indent=2),
              encoding="utf-8",
          )
          print(json.dumps(cell, indent=2))
          PY

      - name: Run ATOMesh benchmark cell via PR 1475 submitter
        run: |
          set -euo pipefail
          original_workspace="${GITHUB_WORKSPACE}"
          result_dir="${original_workspace}/atomesh-results"
          mkdir -p "${result_dir}"

          cell_id="$(
            python3 -c 'import json; print(json.load(open("atomesh-cell.json"))["id"])'
          )"
          shared_workspace="${ATOMESH_SHARED_WORKSPACE_ROOT%/}/${GITHUB_RUN_ID}/${GITHUB_RUN_ATTEMPT}/${cell_id}"
          mkdir -p "${shared_workspace}"

          tar -C "${original_workspace}/ATOM" -cf - . | tar \
            --no-same-owner \
            --no-same-permissions \
            -C "${shared_workspace}" \
            -xf -

          cd "${shared_workspace}"
          chmod +x .github/scripts/atomesh/*.sh .github/scripts/atomesh/*.py

          cancel_helper="${result_dir}/${cell_id}.slurm-cancel.sh"
          cancel_slurm_from_wrapper() {
            local rc=$?
            if [[ "${rc}" -ne 0 && -x "${cancel_helper}" ]]; then
              echo "=== cancelling ATOMesh job from workflow wrapper rc=${rc} ==="
              bash "${cancel_helper}" || true
            fi
            exit "${rc}"
          }
          trap cancel_slurm_from_wrapper EXIT
          trap 'exit 130' INT
          trap 'exit 143' TERM

          bash .github/scripts/atomesh/pd_submit.sh \
            --cell-json "$(cat "${original_workspace}/atomesh-cell.json")" \
            --result-dir "${result_dir}"

      - name: Summarize ATOMesh smoke result
        if: always()
        run: |
          set -euo pipefail
          cd ATOM
          mkdir -p ../atomesh-results
          if [ -f ../atomesh-cell.json ]; then
            cell_id="$(
              python3 -c 'import json; print(json.load(open("../atomesh-cell.json"))["id"])'
            )"
            summary="../atomesh-results/${cell_id}-summary.md"
            output="../atomesh-results/${cell_id}-benchmark-action.json"
            python3 .github/scripts/atomesh/process_result.py \
              "../atomesh-results/${cell_id}" \
              --output "${output}" \
              --summary "${summary}" \
              --run-url "https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" || true
            if [ -f "${summary}" ]; then
              cat "${summary}" >> "${GITHUB_STEP_SUMMARY}"
              cat "${summary}"
            fi
          fi

      - name: Upload ATOMesh smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atom-di-ci-smoke-${{ github.run_id }}-${{ github.run_attempt }}
          if-no-files-found: ignore
          retention-days: 7
          path: |
            atomesh-cell.json
            atomesh-matrix.json
            atomesh-results/
