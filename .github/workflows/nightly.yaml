name: Nightly Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      docker_image:
        description: 'Docker image for build'
        type: string
        required: false
      python_version:
        description: 'Python version, e.g. 3.10, 3.12, 3.13 (default: builds both 3.10 and 3.12)'
        type: string
        required: false
      gpu_archs:
        description: 'GPU architectures (default: gfx942;gfx950)'
        type: string
        required: false
      skip_tests:
        description: 'Skip test job for faster iteration'
        type: boolean
        default: false
      skip_promote:
        description: 'Skip promote job (build + test only)'
        type: boolean
        default: false
      run_sglang:
        description: 'Run SGLang integration tests'
        type: boolean
        default: false
      run_vllm:
        description: 'Run vLLM integration tests'
        type: boolean
        default: false
      run_atom:
        description: 'Run ATOM integration tests'
        type: boolean
        default: false
      sglang_job_filter:
        description: 'SGLang scout filter (nightly-amd, pr-test-amd, etc.)'
        type: string
        required: false
        default: 'all'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # ── Build ────────────────────────────────────────────────────────────
  build:
    uses: ./.github/workflows/aiter-release.yaml
    with:
      release_type: ${{ github.event_name == 'schedule' && 'nightlies' || 'devreleases' }}
      docker_image_py310: ${{ github.event.inputs.docker_image || 'rocm/pytorch:rocm7.2_ubuntu22.04_py3.10_pytorch_release_2.9.1' }}
      docker_image_py312: ${{ github.event.inputs.docker_image || 'rocm/pytorch:rocm7.2_ubuntu24.04_py3.12_pytorch_release_2.9.1' }}
      build_py310: ${{ github.event.inputs.python_version == '' || github.event.inputs.python_version == '3.10' }}
      build_py312: ${{ github.event.inputs.python_version == '' || github.event.inputs.python_version == '3.12' }}
      gpu_archs: ${{ github.event.inputs.gpu_archs || 'gfx942;gfx950' }}
      runner: build-only-aiter
      add_date_stamp: true
    permissions:
      id-token: write
      contents: read
      actions: read

  # ── Wheel smoke tests ───────────────────────────────────────────────
  test:
    needs: build
    if: ${{ !(github.event.inputs.skip_tests || false) }}
    uses: ./.github/workflows/test-whl.yaml
    with:
      release_type: ${{ github.event_name == 'schedule' && 'nightlies' || 'devreleases' }}
      wheel_names: ${{ needs.build.outputs.wheel_names }}
    permissions:
      contents: read
      actions: read

  # ── Load model configs ──────────────────────────────────────────────
  load-configs:
    needs: [build, test]
    if: >-
      github.event.inputs.run_vllm == 'true' ||
      github.event.inputs.run_atom == 'true'
    runs-on: ubuntu-latest
    outputs:
      vllm_matrix: ${{ steps.load.outputs.vllm_matrix }}
      atom_matrix: ${{ steps.load.outputs.atom_matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Load model configs from JSON
        id: load
        run: |
          echo "vllm_matrix=$(cat .github/configs/vllm_models.json | jq -c .)" >> "$GITHUB_OUTPUT"
          echo "atom_matrix=$(cat .github/configs/atom_models.json | jq -c .)" >> "$GITHUB_OUTPUT"

  # ── SGLang Scout ────────────────────────────────────────────────────
  sglang:
    name: "SGLang Scout"
    needs: [build, test]
    if: ${{ github.event.inputs.run_sglang == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run SGLang Scout
        env:
          GH_TOKEN: ${{ secrets.SGLANG_PAT }}
        run: |
          bash .github/scripts/run_sglang.sh \
            "${{ github.sha }}" \
            "${{ github.event.inputs.sglang_job_filter || 'all' }}"

  # ── vLLM Benchmarks ────────────────────────────────────────────────
  vllm:
    name: "vLLM (${{ matrix.label }}, ${{ matrix.model_name }}, ${{ matrix.kv }})"
    needs: load-configs
    if: ${{ github.event.inputs.run_vllm == 'true' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-configs.outputs.vllm_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Docker login
        run: docker login -u rocmshared -p ${{ secrets.DOCKER_PASSWORD }} || true
      - name: Run vLLM benchmark
        timeout-minutes: 45
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_TEST }}
        run: |
          bash .github/scripts/run_vllm.sh \
            "${{ github.sha }}" \
            "${{ matrix.model }}" \
            "${{ matrix.tp }}" \
            "${{ matrix.kv }}"
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vllm-${{ matrix.label }}-${{ matrix.model_name }}-${{ matrix.kv }}
          path: vllm_nightly_*.log

  # ── ATOM Accuracy ──────────────────────────────────────────────────
  atom:
    name: "ATOM (${{ matrix.model_name }})"
    needs: load-configs
    if: ${{ github.event.inputs.run_atom == 'true' }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-configs.outputs.atom_matrix) }}
    steps:
      - uses: actions/checkout@v4
      - name: Docker login
        run: docker login -u rocmshared -p ${{ secrets.DOCKER_PASSWORD }} || true
      - name: Run ATOM accuracy test
        timeout-minutes: 90
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_TEST }}
          ATOM_ENV_VARS: ${{ matrix.env_vars }}
        run: |
          bash .github/scripts/run_atom.sh \
            "${{ github.sha }}" \
            "${{ matrix.model_path }}" \
            "${{ matrix.threshold }}" \
            "${{ matrix.extra_args }}"
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atom-${{ matrix.model_name }}
          path: atom_nightly_*.txt

  # ── Promote ────────────────────────────────────────────────────────
  promote:
    needs: [build, test, sglang, vllm, atom]
    if: >-
      always() &&
      github.repository_owner == 'ROCm' &&
      !(github.event.inputs.skip_promote || false) &&
      needs.build.result == 'success' &&
      needs.test.result == 'success' &&
      (needs.sglang.result == 'success' || needs.sglang.result == 'skipped') &&
      (needs.vllm.result == 'success' || needs.vllm.result == 'skipped') &&
      (needs.atom.result == 'success' || needs.atom.result == 'skipped')
    uses: ./.github/workflows/promote.yaml
    with:
      release_type: ${{ github.event_name == 'schedule' && 'nightlies' || 'devreleases' }}
      wheel_names: ${{ needs.build.outputs.wheel_names }}
    permissions:
      id-token: write
      contents: read
