name: Nightly Build

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      docker_image_py310:
        description: 'Docker image for Python 3.10 build'
        type: string
        required: false
        default: 'rocm/pytorch:rocm6.2_ubuntu22.04_py3.10_pytorch_release-2.3.0'
      docker_image_py312:
        description: 'Docker image for Python 3.12 build'
        type: string
        required: false
        default: 'rocm/vllm-dev:nightly'
      gpu_archs:
        description: 'GPU architectures (e.g. gfx942;gfx950)'
        type: string
        required: false
        default: 'gfx942;gfx950'
      skip_tests:
        description: 'Skip test job for faster iteration'
        type: boolean
        default: false
      skip_promote:
        description: 'Skip promote job (build + test only)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/build-whl.yaml
    with:
      release_type: ${{ github.event_name == 'schedule' && 'nightlies' || 'devreleases' }}
      docker_image_py310: ${{ inputs.docker_image_py310 || 'rocm/pytorch:rocm6.2_ubuntu22.04_py3.10_pytorch_release-2.3.0' }}
      docker_image_py312: ${{ inputs.docker_image_py312 || 'rocm/vllm-dev:nightly' }}
      gpu_archs: ${{ inputs.gpu_archs || 'gfx942;gfx950' }}
    permissions:
      id-token: write
      contents: read

  test:
    needs: build
    if: ${{ !(inputs.skip_tests || false) }}
    uses: ./.github/workflows/test-whl.yaml
    with:
      docker_image: ${{ inputs.docker_image_py312 || 'rocm/vllm-dev:nightly' }}
    permissions:
      contents: read

  promote:
    needs: [build, test]
    if: >-
      ${{ github.repository_owner == 'ROCm'
          && !(inputs.skip_promote || false) }}
    uses: ./.github/workflows/promote.yaml
    with:
      release_type: ${{ github.event_name == 'schedule' && 'nightlies' || 'devreleases' }}
      wheel_names: ${{ needs.build.outputs.wheel_names }}
    permissions:
      id-token: write
      contents: read
