name: Nightly Build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
    inputs:
      docker_image:
        description: 'Docker image for build'
        type: string
        required: false
      python_version:
        description: 'Python version, e.g. 3.10, 3.12, 3.13 (default: builds both 3.10 and 3.12)'
        type: string
        required: false
      gpu_archs:
        description: 'GPU architectures (default: gfx942;gfx950)'
        type: string
        required: false
      skip_build:
        description: 'Skip build + wheel tests (go straight to integration tests)'
        type: boolean
        default: false
      skip_wheel_smoke:
        description: 'Skip wheel smoke sanity gate'
        type: boolean
        default: false
      skip_tests:
        description: '[Deprecated] alias for skip_wheel_smoke'
        type: boolean
        default: false
      skip_sglang:
        description: 'Skip SGLang integration tests'
        type: boolean
        default: false
      skip_vllm:
        description: 'Skip vLLM integration tests'
        type: boolean
        default: false
      skip_atom:
        description: 'Skip ATOM integration tests'
        type: boolean
        default: false
      skip_promote:
        description: 'Skip promote job'
        type: boolean
        default: false
      aiter_index_url:
        description: 'AITER pip index URL'
        type: string
        required: false
        default: 'https://rocm.frameworks-devreleases.amd.com/whl-staging/gfx942-gfx950/'
      aiter_version:
        description: 'AITER version to install (e.g. 0.1.12.post1+rocm7.2.1). Leave blank for latest.'
        type: string
        required: false
        default: ''
      run_sglang:
        description: 'Run SGLang integration tests'
        type: boolean
        default: false
      run_vllm:
        description: 'Run vLLM integration tests'
        type: boolean
        default: false
      run_atom:
        description: 'Run ATOM integration tests'
        type: boolean
        default: false
      sglang_job_filter:
        description: 'SGLang scout filter'
        type: choice
        options:
          - all
          - nightly-amd
          - nightly-amd-rocm720
          - pr-test-amd
          - pr-test-amd-rocm720
        default: 'all'

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.sha }}
  cancel-in-progress: true

jobs:
  # ── Build ────────────────────────────────────────────────────────────
  build:
    if: ${{ github.event.inputs.skip_build != 'true' }}
    uses: ./.github/workflows/aiter-release.yaml
    with:
      release_type: ${{ github.event_name == 'schedule' && 'nightlies' || 'devreleases' }}
      docker_image_py310: ${{ github.event.inputs.docker_image || 'rocm/pytorch:rocm7.2_ubuntu22.04_py3.10_pytorch_release_2.9.1' }}
      docker_image_py312: ${{ github.event.inputs.docker_image || 'rocm/pytorch:rocm7.2_ubuntu24.04_py3.12_pytorch_release_2.9.1' }}
      build_py310: ${{ github.event.inputs.python_version == '' || github.event.inputs.python_version == '3.10' }}
      build_py312: ${{ github.event.inputs.python_version == '' || github.event.inputs.python_version == '3.12' }}
      gpu_archs: ${{ github.event.inputs.gpu_archs || 'gfx942;gfx950' }}
      runner: build-only-aiter
      add_date_stamp: true
    permissions:
      id-token: write
      contents: read
      actions: read

  # ── Wheel smoke tests ───────────────────────────────────────────────
  wheel-smoke:
    needs: [build, load-configs]
    if: >-
      (github.event.inputs.skip_build != 'true' || github.event.inputs.aiter_version != '') &&
      (
        (
          github.event.inputs.skip_sglang != 'true' &&
          github.event.inputs.skip_sglang != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_sglang == 'true'
          )
        ) ||
        (
          github.event.inputs.skip_vllm != 'true' &&
          github.event.inputs.skip_vllm != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_vllm == 'true'
          )
        ) ||
        (
          github.event.inputs.skip_atom != 'true' &&
          github.event.inputs.skip_atom != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_atom == 'true'
          )
        )
      )
    uses: ./.github/workflows/test-whl.yaml
    with:
      release_type: ${{ github.event_name == 'schedule' && 'nightlies' || 'devreleases' }}
      wheel_names: ${{ needs.build.outputs.wheel_names || '' }}
      aiter_index_url: ${{ github.event.inputs.aiter_index_url }}
      aiter_version: ${{ github.event.inputs.aiter_version }}
      skip_smoke: ${{ github.event.inputs.skip_wheel_smoke == 'true' || github.event.inputs.skip_tests == 'true' }}
    permissions:
      contents: read
      actions: read

  # ── Load model configs ──────────────────────────────────────────────
  load-configs:
    if: >-
      always() && (
        (
          github.event.inputs.skip_sglang != 'true' &&
          github.event.inputs.skip_sglang != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_sglang == 'true'
          )
        ) ||
        (
          github.event.inputs.skip_vllm != 'true' &&
          github.event.inputs.skip_vllm != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_vllm == 'true'
          )
        ) ||
        (
          github.event.inputs.skip_atom != 'true' &&
          github.event.inputs.skip_atom != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_atom == 'true'
          )
        )
      )
    runs-on: ubuntu-latest
    outputs:
      sglang_matrix: ${{ steps.load.outputs.sglang_matrix }}
      vllm_matrix: ${{ steps.load.outputs.vllm_matrix }}
      vllm_tests_matrix: ${{ steps.load.outputs.vllm_tests_matrix }}
      atom_matrix: ${{ steps.load.outputs.atom_matrix }}
    steps:
      - uses: actions/checkout@v4
      - name: Load model configs from JSON
        id: load
        run: |
          python - <<'PY'
import json
import os
from pathlib import Path

config_dir = Path(".github/configs")
output_path = Path(os.environ["GITHUB_OUTPUT"])

def write_output(name, payload):
    with output_path.open("a") as fh:
        fh.write(f"{name}={json.dumps(payload, separators=(',',':'))}\n")

def normalize_runner(entry):
    runner = entry.get("runner", "")
    label = (entry.get("test_name") or entry.get("label") or entry.get("model_name") or "").lower()
    if runner == "aiter-1gpu-runner":
        entry["runner"] = "linux-aiter-mi300x-1"
    elif runner == "aiter-8gpu-runner":
        if any(token in label for token in ["2gpu", "2-gpu", "2_gpu"]):
            entry["runner"] = "linux-aiter-mi300x-2"
        elif any(token in label for token in ["4gpu", "4-gpu", "4_gpu"]):
            entry["runner"] = "linux-aiter-mi300x-4"
        elif "mi35x" in label:
            entry["runner"] = "linux-aiter-mi35x-8"
        else:
            entry["runner"] = "linux-aiter-mi300x-8"
    return entry

def normalize_vllm(entry):
    runner = entry.get("runner", "")
    if runner == "aiter-1gpu-runner":
        entry["runner"] = "linux-aiter-mi300x-1"
    elif runner == "aiter-8gpu-runner":
        tp = entry.get("tp", 8)
        if entry.get("label", "").lower().startswith("mi35x"):
            entry["runner"] = "linux-aiter-mi35x-8"
        else:
            entry["runner"] = f"linux-aiter-mi300x-{tp}"
    return entry

sglang_matrix = [normalize_runner(dict(item)) for item in json.loads((config_dir / "sglang_tests.json").read_text())]
vllm_matrix = [normalize_vllm(dict(item)) for item in json.loads((config_dir / "vllm_models.json").read_text())]
vllm_tests_matrix = [normalize_runner(dict(item)) for item in json.loads((config_dir / "vllm_tests.json").read_text())]
atom_matrix = json.loads((config_dir / "atom_models.json").read_text())

write_output("sglang_matrix", sglang_matrix)
write_output("vllm_matrix", vllm_matrix)
write_output("vllm_tests_matrix", vllm_tests_matrix)
write_output("atom_matrix", atom_matrix)
PY

  # ── SGLang Integration ───────────────────────────────────────────────
  sglang:
    name: "SGLang (${{ matrix.test_name }})"
    needs: [load-configs, wheel-smoke]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-configs.outputs.sglang_matrix) }}
    steps:
      - name: Skip SGLang suites
        if: >-
          github.event.inputs.skip_sglang == 'true' ||
          github.event.inputs.skip_sglang == true ||
          (
            github.event_name == 'workflow_dispatch' &&
            github.event.inputs.run_sglang != 'true'
          )
        run: echo "SGLang integration suite skipped by workflow inputs."
      - uses: actions/checkout@v4
        if: >-
          github.event.inputs.skip_sglang != 'true' &&
          github.event.inputs.skip_sglang != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_sglang == 'true'
          )
      - name: Docker login
        if: >-
          github.event.inputs.skip_sglang != 'true' &&
          github.event.inputs.skip_sglang != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_sglang == 'true'
          )
        run: docker login -u rocmshared -p ${{ secrets.DOCKER_PASSWORD }} || true
      - name: Run SGLang test
        if: >-
          github.event.inputs.skip_sglang != 'true' &&
          github.event.inputs.skip_sglang != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_sglang == 'true'
          )
        timeout-minutes: ${{ matrix.timeout }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_TEST }}
          AITER_VERSION: ${{ github.event.inputs.aiter_version }}
        run: |
          bash .github/scripts/run_sglang.sh \
            "${{ github.sha }}" \
            "${{ matrix.test_cmd }}" \
            "${{ github.event.inputs.aiter_index_url }}"

  # ── vLLM Benchmarks ────────────────────────────────────────────────
  vllm:
    name: "vLLM (${{ matrix.label }}, ${{ matrix.model_name }}, ${{ matrix.kv }})"
    needs: [load-configs, wheel-smoke]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-configs.outputs.vllm_matrix) }}
    steps:
      - name: Skip vLLM benchmarks
        if: >-
          github.event.inputs.skip_vllm == 'true' ||
          github.event.inputs.skip_vllm == true ||
          (
            github.event_name == 'workflow_dispatch' &&
            github.event.inputs.run_vllm != 'true'
          )
        run: echo "vLLM benchmark suite skipped by workflow inputs."
      - uses: actions/checkout@v4
        if: >-
          github.event.inputs.skip_vllm != 'true' &&
          github.event.inputs.skip_vllm != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_vllm == 'true'
          )
      - name: Load vLLM pins
        if: >-
          github.event.inputs.skip_vllm != 'true' &&
          github.event.inputs.skip_vllm != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_vllm == 'true'
          )
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
import json
with open(".github/configs/vllm_pins.json") as f:
    cfg = json.load(f)
print(f"VLLM_BASE_IMAGE={cfg['base_image']}")
print(f"VLLM_COMMIT={cfg['vllm_commit']}")
PY
      - name: Docker login
        if: >-
          github.event.inputs.skip_vllm != 'true' &&
          github.event.inputs.skip_vllm != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_vllm == 'true'
          )
        run: docker login -u rocmshared -p ${{ secrets.DOCKER_PASSWORD }} || true
      - name: Run vLLM benchmark
        if: >-
          github.event.inputs.skip_vllm != 'true' &&
          github.event.inputs.skip_vllm != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_vllm == 'true'
          )
        timeout-minutes: 45
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_TEST }}
          AITER_VERSION: ${{ github.event.inputs.aiter_version }}
          VLLM_BASE_IMAGE: ${{ env.VLLM_BASE_IMAGE }}
          VLLM_COMMIT: ${{ env.VLLM_COMMIT }}
          VLLM_INSTALL_MODE: ${{ matrix.install_mode || 'source' }}
          VLLM_EXTRA_ARGS: ${{ matrix.extra_args || '' }}
        run: |
          bash .github/scripts/run_vllm.sh \
            "${{ github.sha }}" \
            "${{ matrix.model }}" \
            "${{ matrix.tp }}" \
            "${{ matrix.kv }}" \
            "${{ github.event.inputs.aiter_index_url }}"
      - name: Upload logs
        if: >-
          always() &&
          github.event.inputs.skip_vllm != 'true' &&
          github.event.inputs.skip_vllm != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_vllm == 'true'
          )
        uses: actions/upload-artifact@v4
        with:
          name: vllm-${{ matrix.label }}-${{ matrix.model_name }}-${{ matrix.kv }}
          path: vllm_nightly_*.log

  # ── vLLM AITER Kernel Tests ─────────────────────────────────────────
  vllm-tests:
    name: "vLLM Test (${{ matrix.test_name }})"
    needs: [load-configs, wheel-smoke]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: ${{ matrix.timeout }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-configs.outputs.vllm_tests_matrix) }}
    steps:
      - name: Skip vLLM kernel tests
        if: >-
          github.event.inputs.skip_vllm == 'true' ||
          github.event.inputs.skip_vllm == true ||
          (
            github.event_name == 'workflow_dispatch' &&
            github.event.inputs.run_vllm != 'true'
          )
        run: echo "vLLM kernel test suite skipped by workflow inputs."
      - uses: actions/checkout@v4
        if: >-
          github.event.inputs.skip_vllm != 'true' &&
          github.event.inputs.skip_vllm != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_vllm == 'true'
          )
      - name: Load vLLM pins
        if: >-
          github.event.inputs.skip_vllm != 'true' &&
          github.event.inputs.skip_vllm != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_vllm == 'true'
          )
        run: |
          python - <<'PY' >> "$GITHUB_ENV"
import json
with open(".github/configs/vllm_pins.json") as f:
    cfg = json.load(f)
print(f"VLLM_BASE_IMAGE={cfg['base_image']}")
print(f"VLLM_COMMIT={cfg['vllm_commit']}")
PY
      - name: Docker login
        if: >-
          github.event.inputs.skip_vllm != 'true' &&
          github.event.inputs.skip_vllm != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_vllm == 'true'
          )
        run: docker login -u rocmshared -p ${{ secrets.DOCKER_PASSWORD }} || true
      - name: Run vLLM AITER test
        if: >-
          github.event.inputs.skip_vllm != 'true' &&
          github.event.inputs.skip_vllm != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_vllm == 'true'
          )
        timeout-minutes: ${{ matrix.timeout }}
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_TEST }}
          AITER_VERSION: ${{ github.event.inputs.aiter_version }}
          VLLM_BASE_IMAGE: ${{ env.VLLM_BASE_IMAGE }}
          VLLM_COMMIT: ${{ env.VLLM_COMMIT }}
          VLLM_INSTALL_MODE: ${{ matrix.install_mode || 'source' }}
          VLLM_EXTRA_ARGS: ${{ matrix.extra_args || '' }}
        run: |
          bash .github/scripts/run_vllm_test.sh \
            "${{ github.sha }}" \
            "${{ matrix.test_cmd }}" \
            "${{ github.event.inputs.aiter_index_url }}"

  # ── ATOM Accuracy ──────────────────────────────────────────────────
  atom:
    name: "ATOM (${{ matrix.model_name }})"
    needs: [load-configs, wheel-smoke]
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 120
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-configs.outputs.atom_matrix) }}
    steps:
      - name: Skip ATOM tests
        if: >-
          github.event.inputs.skip_atom == 'true' ||
          github.event.inputs.skip_atom == true ||
          (
            github.event_name == 'workflow_dispatch' &&
            github.event.inputs.run_atom != 'true'
          )
        run: echo "ATOM accuracy suite skipped by workflow inputs."
      - uses: actions/checkout@v4
        if: >-
          github.event.inputs.skip_atom != 'true' &&
          github.event.inputs.skip_atom != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_atom == 'true'
          )
      - name: Docker login
        if: >-
          github.event.inputs.skip_atom != 'true' &&
          github.event.inputs.skip_atom != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_atom == 'true'
          )
        run: docker login -u rocmshared -p ${{ secrets.DOCKER_PASSWORD }} || true
      - name: Run ATOM accuracy test
        if: >-
          github.event.inputs.skip_atom != 'true' &&
          github.event.inputs.skip_atom != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_atom == 'true'
          )
        timeout-minutes: 90
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN_TEST }}
          AITER_VERSION: ${{ github.event.inputs.aiter_version }}
          ATOM_ENV_VARS: ${{ matrix.env_vars }}
          GITHUB_WORKSPACE: ${{ github.workspace }}
        run: |
          bash .github/scripts/run_atom.sh \
            "${{ github.sha }}" \
            "${{ matrix.model_path }}" \
            "${{ matrix.threshold }}" \
            "${{ matrix.extra_args }}" \
            "${{ github.event.inputs.aiter_index_url }}"
      - name: Upload logs
        if: >-
          always() &&
          github.event.inputs.skip_atom != 'true' &&
          github.event.inputs.skip_atom != true &&
          (
            github.event_name != 'workflow_dispatch' ||
            github.event.inputs.run_atom == 'true'
          )
        uses: actions/upload-artifact@v4
        with:
          name: atom-${{ matrix.model_name }}
          path: atom_nightly_*.txt

  # ── Promote ────────────────────────────────────────────────────────
  promote:
    needs: [build, wheel-smoke, sglang, vllm, vllm-tests, atom]
    if: >-
      always() &&
      github.repository_owner == 'ROCm' &&
      github.event.inputs.skip_promote != 'true' &&
      github.event.inputs.skip_build != 'true' &&
      needs.build.result == 'success' &&
      (needs.wheel-smoke.result == 'success' || needs.wheel-smoke.result == 'skipped') &&
      (needs.sglang.result == 'success' || needs.sglang.result == 'skipped') &&
      (needs.vllm.result == 'success' || needs.vllm.result == 'skipped') &&
      (needs.vllm-tests.result == 'success' || needs.vllm-tests.result == 'skipped') &&
      (needs.atom.result == 'success' || needs.atom.result == 'skipped')
    uses: ./.github/workflows/promote.yaml
    with:
      release_type: ${{ github.event_name == 'schedule' && 'nightlies' || 'devreleases' }}
      wheel_names: ${{ needs.build.outputs.wheel_names }}
    permissions:
      id-token: write
      contents: read
