name: PR Welcome Comment

on:
  pull_request:
    types: [opened, reopened]

jobs:
  comment:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `### 🏷️ Available CI Labels

            By default, only standard tests run on PRs. You can trigger extended tests by adding these labels:

            | Label | Tests |
            |-------|-------|
            | \`ci:sglang\` | SGLang integration tests |
            | \`ci:atom\` | ATOM benchmark |
            | \`ci:vllm\` | vLLM benchmark (8 GPU) |
            | \`ci:all\` | All extended tests |

            > Add labels via the sidebar or \`gh pr edit --add-label <label>\``
            });
