name: Sglang Downstream Test

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    branches: [main]  # Triggers on PRs targeting `main`
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check-signal:
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      (contains(github.event.pull_request.labels.*.name, 'ci:sglang') ||
      contains(github.event.pull_request.labels.*.name, 'ci:all')))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and check signal artifact
        run: ./.github/scripts/check_signal.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}

  sglang:
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      (contains(github.event.pull_request.labels.*.name, 'ci:sglang') ||
      contains(github.event.pull_request.labels.*.name, 'ci:all')))
    name: Sglang Model E2E Test (8 GPU)
    needs: [check-signal]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: linux-aiter-mi35x-8
            label: MI35X

    env:
      SGL_BRANCH: main
      GPU_ARCH: gfx950
      SGLANG_CI_HOSTNAME_OVERRIDE: linux-mi35x-gpu-8
      GITHUB_REPO_URL: ${{ github.event.pull_request.head.repo.clone_url || 'https://github.com/ROCm/aiter.git' }}
      GITHUB_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.event.head_commit.id }}

    steps:
      - name: Checkout aiter repo
        uses: actions/checkout@v4

      - name: Prepare sglang workspace
        run: |
          set -ex
          SGLANG_WORKSPACE="${RUNNER_TEMP}/sglang-downstream"
          rm -rf "${SGLANG_WORKSPACE}"
          git clone --depth 1 -b ${SGL_BRANCH} https://github.com/sgl-project/sglang.git "${SGLANG_WORKSPACE}"
          test -d "${SGLANG_WORKSPACE}/sgl-kernel"
          test -d "${SGLANG_WORKSPACE}/python"
          echo "SGLANG_WORKSPACE=${SGLANG_WORKSPACE}" >> "${GITHUB_ENV}"

      - name: Docker login
        run: docker login -u rocmshared -p ${{ secrets.DOCKER_PASSWORD }} || true

      - name: Patch sglang CI scripts for aiter runners
        run: |
          cd "${SGLANG_WORKSPACE}"
          python3 - <<'PY'
          from pathlib import Path

          def replace_once(path_str: str, old: str, new: str) -> None:
              path = Path(path_str)
              text = path.read_text()
              if old not in text:
                  raise SystemExit(f"Expected snippet not found in {path}: {old!r}")
              path.write_text(text.replace(old, new, 1))

          hostname_override = 'HOSTNAME_VALUE="${SGLANG_CI_HOSTNAME_OVERRIDE:-$(hostname)}"'
          for rel in (
              "scripts/ci/amd/amd_ci_start_container.sh",
              "scripts/ci/amd/amd_ci_install_dependency.sh",
              "scripts/ci/amd/amd_ci_exec.sh",
          ):
              replace_once(rel, "HOSTNAME_VALUE=$(hostname)", hostname_override)

          replace_once(
              "scripts/ci/amd/amd_ci_install_dependency.sh",
              "install_with_retry docker exec -w /human-eval ci_sglang pip install --cache-dir=/sgl-data/pip-cache -e .",
              "install_with_retry docker exec -w /human-eval ci_sglang pip install --cache-dir=/sgl-data/pip-cache --no-build-isolation -e .",
          )
          PY

      - name: Start CI container
        run: |
          set -ex
          docker rm -f ci_sglang || true
          cd "${SGLANG_WORKSPACE}"
          GITHUB_WORKSPACE="${SGLANG_WORKSPACE}" HF_TOKEN="${{ secrets.HF_TOKEN_TEST }}" bash scripts/ci/amd/amd_ci_start_container.sh
          docker exec ci_sglang bash -lc 'pwd; ls -la /sglang-checkout; test -d /sglang-checkout/sgl-kernel; test -d /sglang-checkout/python'

      - name: Setup pip config
        run: |
          docker exec -u root ci_sglang bash -c "pip config set global.default-timeout 60"
          docker exec -u root ci_sglang bash -c "pip config set global.retries 10"

      - name: Install dependencies
        run: |
          cd "${SGLANG_WORKSPACE}"
          bash scripts/ci/amd/amd_ci_install_dependency.sh --skip-aiter-build
          bash scripts/ci/amd/amd_ci_exec.sh pip install tabulate
          bash scripts/ci/amd/amd_ci_exec.sh pip install mistral-common "lm-eval[api]"

      - name: Install aiter under test
        id: install_aiter_under_test
        run: |
          set -ex
          docker exec ci_sglang bash -lc "
            set -ex
            pip uninstall -y amd-aiter aiter || true
            rm -rf /tmp/aiter-under-test
            git clone '${GITHUB_REPO_URL}' /tmp/aiter-under-test
            cd /tmp/aiter-under-test
            git checkout '${GITHUB_COMMIT_SHA}'
            git submodule sync --recursive
            git submodule update --init --recursive
            PREBUILD_KERNELS=1 GPU_ARCHS='${GPU_ARCH}' python setup.py build_ext --inplace
            pip install -e .
            pip show amd-aiter || pip show aiter
          "

      - name: Accuracy Test MI35x (8-GPU DeepSeek-R1-MXFP4)
        id: deepseek_r1_mxfp4_accuracy
        timeout-minutes: 130
        continue-on-error: true
        run: |
          set -ex
          cd "${SGLANG_WORKSPACE}"
          > github_summary.md
          bash scripts/ci/amd/amd_ci_exec.sh -w "/sglang-checkout/test" \
            -e GITHUB_STEP_SUMMARY="/sglang-checkout/github_summary.md" \
            python3 run_suite.py --hw amd --suite nightly-amd-8-gpu-mi35x-deepseek-r1-mxfp4 --nightly --timeout-per-file 7200 || TEST_EXIT_CODE=$?
          echo "$(<github_summary.md )" >> "$GITHUB_STEP_SUMMARY" || true
          exit ${TEST_EXIT_CODE:-0}

      - name: Performance Test MI35x (8-GPU DeepSeek-R1-MXFP4)
        id: deepseek_r1_mxfp4_perf
        timeout-minutes: 180
        continue-on-error: true
        run: |
          set -ex
          cd "${SGLANG_WORKSPACE}"
          > github_summary.md
          bash scripts/ci/amd/amd_ci_exec.sh -w "/sglang-checkout/test" \
            -e GITHUB_STEP_SUMMARY="/sglang-checkout/github_summary.md" \
            python3 registered/amd/perf/mi35x/test_deepseek_r1_mxfp4_perf_mi35x.py || TEST_EXIT_CODE=$?
          echo "$(<github_summary.md )" >> "$GITHUB_STEP_SUMMARY" || true
          exit ${TEST_EXIT_CODE:-0}

      - name: Accuracy + Performance Test MI35x (8-GPU Qwen3-235B-MXFP4)
        id: qwen3_235b_mxfp4
        timeout-minutes: 70
        continue-on-error: true
        run: |
          set -ex
          cd "${SGLANG_WORKSPACE}"
          > github_summary.md
          bash scripts/ci/amd/amd_ci_exec.sh -w "/sglang-checkout/test" \
            -e GITHUB_STEP_SUMMARY="/sglang-checkout/github_summary.md" \
            python3 run_suite.py --hw amd --suite nightly-8-gpu-mi35x-qwen3-235b-mxfp4 --nightly --timeout-per-file 3600 || TEST_EXIT_CODE=$?
          echo "$(<github_summary.md )" >> "$GITHUB_STEP_SUMMARY" || true
          exit ${TEST_EXIT_CODE:-0}

      - name: Accuracy Test MI35x (8-GPU Qwen 3.5)
        id: qwen35_accuracy
        timeout-minutes: 70
        continue-on-error: true
        run: |
          set -ex
          cd "${SGLANG_WORKSPACE}"
          > github_summary.md
          bash scripts/ci/amd/amd_ci_exec.sh -w "/sglang-checkout/test" \
            -e GITHUB_STEP_SUMMARY="/sglang-checkout/github_summary.md" \
            python3 run_suite.py --hw amd --suite nightly-amd-accuracy-8-gpu-mi35x-qwen35 --nightly --timeout-per-file 3600 || TEST_EXIT_CODE=$?
          echo "$(<github_summary.md )" >> "$GITHUB_STEP_SUMMARY" || true
          exit ${TEST_EXIT_CODE:-0}

      - name: Performance Test MI35x (8-GPU Qwen 3.5 FP8)
        id: qwen35_perf
        timeout-minutes: 100
        continue-on-error: true
        run: |
          set -ex
          cd "${SGLANG_WORKSPACE}"
          > github_summary.md
          bash scripts/ci/amd/amd_ci_exec.sh -w "/sglang-checkout/test" \
            -e SGLANG_USE_AITER=1 \
            -e GITHUB_STEP_SUMMARY="/sglang-checkout/github_summary.md" \
            python3 run_suite.py --hw amd --suite nightly-perf-8-gpu-mi35x-qwen35-fp8 --nightly --timeout-per-file 5400 || TEST_EXIT_CODE=$?
          echo "$(<github_summary.md )" >> "$GITHUB_STEP_SUMMARY" || true
          exit ${TEST_EXIT_CODE:-0}

      - name: Accuracy Test MI35x (8-GPU DeepSeek-V3.2)
        id: deepseek_v32_accuracy
        timeout-minutes: 70
        continue-on-error: true
        run: |
          set -ex
          cd "${SGLANG_WORKSPACE}"
          > github_summary.md
          bash scripts/ci/amd/amd_ci_exec.sh -w "/sglang-checkout/test" \
            -e GITHUB_STEP_SUMMARY="/sglang-checkout/github_summary.md" \
            python3 run_suite.py --hw amd --suite nightly-amd-8-gpu-mi35x-deepseek-v32 --nightly --timeout-per-file 3600 || TEST_EXIT_CODE=$?
          echo "$(<github_summary.md )" >> "$GITHUB_STEP_SUMMARY" || true
          exit ${TEST_EXIT_CODE:-0}

      - name: Performance Test MI35x (8-GPU DeepSeek-V3.2 Basic)
        id: deepseek_v32_perf
        timeout-minutes: 100
        continue-on-error: true
        run: |
          set -ex
          cd "${SGLANG_WORKSPACE}"
          > github_summary.md
          bash scripts/ci/amd/amd_ci_exec.sh -w "/sglang-checkout/test" \
            -e GITHUB_STEP_SUMMARY="/sglang-checkout/github_summary.md" \
            python3 run_suite.py --hw amd --suite nightly-perf-8-gpu-mi35x-deepseek-v32-basic --nightly --timeout-per-file 5400 || TEST_EXIT_CODE=$?
          echo "$(<github_summary.md )" >> "$GITHUB_STEP_SUMMARY" || true
          exit ${TEST_EXIT_CODE:-0}

      - name: Check model E2E results
        if: ${{ always() && steps.install_aiter_under_test.conclusion == 'success' }}
        run: |
          failed=0

          check_step() {
            local name="$1"
            local outcome="$2"
            if [ "$outcome" != "success" ]; then
              echo "Failed: $name ($outcome)"
              failed=1
            fi
          }

          check_step "deepseek-r1-mxfp4 accuracy" "${{ steps.deepseek_r1_mxfp4_accuracy.outcome }}"
          check_step "deepseek-r1-mxfp4 perf" "${{ steps.deepseek_r1_mxfp4_perf.outcome }}"
          check_step "qwen3-235b-mxfp4" "${{ steps.qwen3_235b_mxfp4.outcome }}"
          check_step "qwen35 accuracy" "${{ steps.qwen35_accuracy.outcome }}"
          check_step "qwen35 perf" "${{ steps.qwen35_perf.outcome }}"
          check_step "deepseek-v32 accuracy" "${{ steps.deepseek_v32_accuracy.outcome }}"
          check_step "deepseek-v32 perf" "${{ steps.deepseek_v32_perf.outcome }}"

          exit $failed

      - name: Clean Up
        if: always()
        run: |
          docker rm -f ci_sglang || true
          rm -rf "${SGLANG_WORKSPACE}" || true
