name: Tuning Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '30 22 * * *'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  DOCKER_IMAGE: rocm/pytorch:latest
  GPU_ARCHS: gfx942
  REPORT_DIR: tuning_test_reports
  LOG_DIR: .github/test-logs/tuning-tests

jobs:
  cpu-validation:
    name: CPU Validation (L0+L1)
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install CPU test dependencies
        run: |
          set -ex
          python -m pip install --upgrade pip
          python -m pip install --index-url https://download.pytorch.org/whl/cpu --extra-index-url https://pypi.org/simple torch
          python -m pip install pandas pyzmq einops numpy==1.26.2 pybind11 ninja tabulate packaging psutil pyyaml

      - name: Run tuning CPU validation
        run: |
          set -euo pipefail
          mkdir -p "${LOG_DIR}" "${REPORT_DIR}"
          python -m unittest \
            op_tests.tuning_tests.test_csv_validation \
            op_tests.tuning_tests.test_tuner_infra \
            op_tests.tuning_tests.test_mp_tuner_logic -v \
            2>&1 | tee "${LOG_DIR}/cpu-validation.log"

      - name: Upload CPU validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tuning-tests-cpu-validation-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            ${{ env.LOG_DIR }}/cpu-validation.log
            ${{ env.REPORT_DIR }}/

  gpu-pipeline:
    name: GPU Pipeline Validation (L2)
    runs-on: aiter-1gpu-runner
    needs: cpu-validation
    timeout-minutes: 75

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login
        run: docker login -u rocmshared -p ${{ secrets.DOCKER_PASSWORD }} || true

      - name: Sync CK submodule
        run: |
          set -ex
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Nightly run: syncing latest CK from develop branch..."
            git submodule set-branch --branch develop 3rdparty/composable_kernel
            git submodule sync
            git submodule update --init --recursive --remote --jobs 4
          else
            echo "Using pinned CK commit..."
            git submodule sync
            git submodule update --init --recursive --depth 1 --jobs 4
          fi

      - name: Clean up ROCm processes
        run: ./.github/scripts/clean_up_rocm.sh

      - name: Start tuning test container
        run: |
          set -ex
          mkdir -p "${LOG_DIR}" "${REPORT_DIR}"

          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          docker run -dt \
            --device=/dev/kfd $DEVICE_FLAG \
            --shm-size=16G \
            --network=host \
            --group-add $(getent group render | cut -d: -f3) \
            --group-add $(getent group video | cut -d: -f3) \
            -e GPU_ARCHS="${GPU_ARCHS}" \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ github.workspace }}/$REPORT_DIR:/tmp/tuning_test_reports" \
            -w /workspace \
            --name tuning_tests_pipeline \
            $DOCKER_IMAGE

      - name: Setup Aiter
        run: |
          set -ex
          docker exec \
            -e GPU_ARCHS="${GPU_ARCHS}" \
            -w /workspace \
            tuning_tests_pipeline \
            bash -lc "BUILD_TRITON=0 ./.github/scripts/build_aiter_triton.sh"

      - name: Run tuning pipeline tests
        run: |
          set -ex
          docker exec \
            -e GPU_ARCHS="${GPU_ARCHS}" \
            -e PYTHONUNBUFFERED=1 \
            -w /workspace \
            tuning_tests_pipeline \
            bash -lc "set -euo pipefail; python3 -m unittest op_tests.tuning_tests.test_tune_pipeline -v 2>&1 | tee /workspace/${LOG_DIR}/gpu-pipeline.log"

      - name: Upload GPU pipeline artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tuning-tests-gpu-pipeline-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            ${{ env.LOG_DIR }}/gpu-pipeline.log
            ${{ env.REPORT_DIR }}/

      - name: Cleanup container
        if: always()
        run: docker rm -f tuning_tests_pipeline || true

      - name: Clean up ROCm processes
        if: always()
        run: ./.github/scripts/clean_up_rocm.sh

  gpu-run-config:
    name: GPU Run Config Validation (L2)
    runs-on: aiter-1gpu-runner
    needs: cpu-validation
    timeout-minutes: 120

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Docker login
        run: docker login -u rocmshared -p ${{ secrets.DOCKER_PASSWORD }} || true

      - name: Sync CK submodule
        run: |
          set -ex
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "Nightly run: syncing latest CK from develop branch..."
            git submodule set-branch --branch develop 3rdparty/composable_kernel
            git submodule sync
            git submodule update --init --recursive --remote --jobs 4
          else
            echo "Using pinned CK commit..."
            git submodule sync
            git submodule update --init --recursive --depth 1 --jobs 4
          fi

      - name: Clean up ROCm processes
        run: ./.github/scripts/clean_up_rocm.sh

      - name: Start tuning test container
        run: |
          set -ex
          mkdir -p "${LOG_DIR}" "${REPORT_DIR}"

          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          docker run -dt \
            --device=/dev/kfd $DEVICE_FLAG \
            --shm-size=16G \
            --network=host \
            --group-add $(getent group render | cut -d: -f3) \
            --group-add $(getent group video | cut -d: -f3) \
            -e GPU_ARCHS="${GPU_ARCHS}" \
            -v "${{ github.workspace }}:/workspace" \
            -v "${{ github.workspace }}/$REPORT_DIR:/tmp/tuning_test_reports" \
            -w /workspace \
            --name tuning_tests_run_config \
            $DOCKER_IMAGE

      - name: Setup Aiter
        run: |
          set -ex
          docker exec \
            -e GPU_ARCHS="${GPU_ARCHS}" \
            -w /workspace \
            tuning_tests_run_config \
            bash -lc "BUILD_TRITON=0 ./.github/scripts/build_aiter_triton.sh"

      - name: Run tuning run_config validation
        run: |
          set -ex
          docker exec \
            -e GPU_ARCHS="${GPU_ARCHS}" \
            -e PYTHONUNBUFFERED=1 \
            -w /workspace \
            tuning_tests_run_config \
            bash -lc "set -euo pipefail; python3 -m unittest op_tests.tuning_tests.test_run_config -v 2>&1 | tee /workspace/${LOG_DIR}/gpu-run-config.log"

      - name: Run preshuffle regression validation
        run: |
          set -ex
          docker exec \
            -e GPU_ARCHS="${GPU_ARCHS}" \
            -e PYTHONUNBUFFERED=1 \
            -e TUNE_TEST_FAMILY=a8w8_blockscale_bpreshuffle \
            -w /workspace \
            tuning_tests_run_config \
            bash -lc "set -euo pipefail; python3 -m unittest op_tests.tuning_tests.test_run_config.TestRunConfigCustom -v 2>&1 | tee /workspace/${LOG_DIR}/gpu-run-config-preshuffle.log"

      - name: Upload GPU run_config artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tuning-tests-gpu-run-config-${{ github.run_id }}
          if-no-files-found: ignore
          path: |
            ${{ env.LOG_DIR }}/gpu-run-config.log
            ${{ env.LOG_DIR }}/gpu-run-config-preshuffle.log
            ${{ env.REPORT_DIR }}/

      - name: Cleanup container
        if: always()
        run: docker rm -f tuning_tests_run_config || true

      - name: Clean up ROCm processes
        if: always()
        run: ./.github/scripts/clean_up_rocm.sh
