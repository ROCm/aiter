name: Aiter Release Package

description: This workflow builds the Aiter Python package as .whl files for Python 3.10 and 3.12, and uploads them as artifacts.

on:
  workflow_dispatch:
    inputs:
      commit:
        description: 'Commit hash to build (leave empty to use current commit)'
        required: false
      build_py310:
        description: 'Build with Python 3.10'
        type: boolean
        default: true
      build_py312:
        description: 'Build with Python 3.12'
        type: boolean
        default: true
      docker_image_py310:
        description: 'Docker image for Python 3.10 build'
        required: true
        default: 'rocm/7.0-preview:rocm7.0_preview_ubuntu_22.04_vllm_0.10.1_instinct_beta'
      docker_image_py312:
        description: 'Docker image for Python 3.12 build'
        required: true
        default: 'rocm/vllm-dev:nightly'
      docker_password_secret:
        description: 'Docker password secret for docker login'
        required: true
        default: 'DOCKER_PASSWORD'
        type: choice
        options:
          - DOCKER_PASSWORD
          - DOCKER_PASSWORD_ROCM
      docker_username:
        description: 'Docker username for docker login'
        required: true
        default: 'rocmshared'
      gpu_archs:
        description: 'GPU architectures (e.g. gfx942;gfx950)'
        required: false
        default: 'gfx942;gfx950'
      rocm_version:
        description: 'ROCm version label for wheel (e.g. 7.2.1). Auto-detected from container if empty.'
        required: false
        default: ''
      runner:
        description: 'Select build host'
        required: true
        default: 'aiter-1gpu-runner'
        type: choice
        options:
          - aiter-1gpu-runner
          - build-only-aiter
          - linux-aiter-mi35x-1

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.rocm_version || 'default' }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/v') }}

jobs:
  build_whl_package:
    runs-on: ${{ github.event.inputs.runner }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - python_version: "3.10"
            docker_image: ${{ github.event.inputs.docker_image_py310 }}
            build_enabled: ${{ github.event.inputs.build_py310 == 'true' || github.event.inputs.build_py310 == true }}
          - python_version: "3.12"
            docker_image: ${{ github.event.inputs.docker_image_py312 }}
            build_enabled: ${{ github.event.inputs.build_py312 == 'true' || github.event.inputs.build_py312 == true }}

    env:
      BUILD_DOCKER_IMAGE: ${{ matrix.docker_image }}
      PYTHON_VERSION: ${{ matrix.python_version }}
      GPU_ARCHS: ${{ github.event.inputs.gpu_archs }}

    steps:
      - name: Checkout aiter repo
        if: ${{ matrix.build_enabled }}
        uses: actions/checkout@v4

      - name: Checkout to user-specified commit (if provided)
        if: ${{ matrix.build_enabled }}
        run: |
          set -ex
          if [ -n "${{ github.event.inputs.commit }}" ]; then
            echo "Checking out to commit: ${{ github.event.inputs.commit }}"
            git fetch --all
            git checkout ${{ github.event.inputs.commit }}
            git submodule update --init --recursive --depth 1 --jobs 4
          else
            echo "No commit input provided, using current commit: $(git rev-parse HEAD)"
          fi

      - name: Sync submodules
        if: ${{ matrix.build_enabled }}
        run: |
          set -ex
          git submodule sync
          git submodule update --init --recursive --depth 1 --jobs 4

      - name: Docker login
        if: ${{ matrix.build_enabled }}
        run: |
          set -ex
          echo "${{ secrets[github.event.inputs.docker_password_secret] }}" | docker login -u "${{ github.event.inputs.docker_username }}" --password-stdin

      - name: Run the container
        if: ${{ matrix.build_enabled }}
        run: |
          set -ex
          echo "Starting container: aiter_build_${{ matrix.python_version }}"
          docker run -dt \
          --shm-size=16G \
          --network=host \
          -v "${{ github.workspace }}:/workspace" \
          -w /workspace \
          --name aiter_build_${{ matrix.python_version }} \
          ${{ env.BUILD_DOCKER_IMAGE }}

      - name: Detect ROCm version
        if: ${{ matrix.build_enabled }}
        id: rocm_ver
        run: |
          set -e
          INPUT_VER="${{ github.event.inputs.rocm_version }}"
          if [ -n "$INPUT_VER" ]; then
            echo "Using user-provided ROCm version: $INPUT_VER"
            echo "rocm_version=$INPUT_VER" >> "$GITHUB_OUTPUT"
          else
            DETECTED=$(docker exec aiter_build_${{ matrix.python_version }} \
              bash -c 'cat /opt/rocm/.info/version 2>/dev/null || echo ""' | tr -d '[:space:]')
            if [ -n "$DETECTED" ]; then
              DETECTED=$(echo "$DETECTED" | cut -d'-' -f1)
              echo "Auto-detected ROCm version: $DETECTED"
              echo "rocm_version=$DETECTED" >> "$GITHUB_OUTPUT"
            else
              echo "WARNING: Could not detect ROCm version, wheel will have no ROCm suffix"
              echo "rocm_version=" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Determine wheel version
        if: ${{ matrix.build_enabled }}
        id: whl_ver
        run: |
          set -e
          ROCM_VER="${{ steps.rocm_ver.outputs.rocm_version }}"
          BASE_VER=$(docker exec -w /workspace aiter_build_${{ matrix.python_version }} \
            python3 -c "from setuptools_scm import get_version; print(get_version())" 2>/dev/null || true)
          if [ -z "$BASE_VER" ]; then
            BASE_VER=$(git describe --tags --match 'v*' 2>/dev/null | sed 's/^v//' || echo "0.1.0")
          fi
          if [ -n "$ROCM_VER" ]; then
            FULL_VER="${BASE_VER}+rocm${ROCM_VER}"
          else
            FULL_VER="${BASE_VER}"
          fi
          echo "Wheel version: $FULL_VER (base=$BASE_VER, rocm=$ROCM_VER)"
          echo "full_version=$FULL_VER" >> "$GITHUB_OUTPUT"
          echo "rocm_suffix=rocm${ROCM_VER}" >> "$GITHUB_OUTPUT"

      - name: Install Dependencies
        if: ${{ matrix.build_enabled }}
        run: |
          set -e
          echo "Install Dependencies"
          docker exec \
          -w /workspace \
          aiter_build_${{ matrix.python_version }} \
          pip install --timeout=60 --retries=10 -r requirements.txt
      
      - name: Install ninja
        if: ${{ matrix.build_enabled }}
        run: |
          set -e
          echo "Install ninja"
          docker exec \
          -w /workspace \
          aiter_build_${{ matrix.python_version }} \
          pip install --timeout=60 --retries=10 ninja

      - name: Build Aiter with precompiled kernels
        if: ${{ matrix.build_enabled }}
        run: |
          set -e
          FULL_VER="${{ steps.whl_ver.outputs.full_version }}"
          echo "Building aiter whl version=${FULL_VER} with PREBUILD_KERNELS=1 for Python ${{ matrix.python_version }}..."
          docker exec \
          -w /workspace \
          aiter_build_${{ matrix.python_version }} \
          bash -c "SETUPTOOLS_SCM_PRETEND_VERSION='${FULL_VER}' PREBUILD_KERNELS=1 GPU_ARCHS='${{ env.GPU_ARCHS }}' python3 setup.py bdist_wheel && ls -lh dist/*.whl"

      - name: Upload whl file as artifact
        if: ${{ matrix.build_enabled }}
        uses: actions/upload-artifact@v4
        with:
          name: aiter-whl-py${{ matrix.python_version }}-${{ steps.whl_ver.outputs.rocm_suffix }}-${{ github.run_id }}
          path: dist/*.whl

      - name: Cleanup container
        if: always()
        run: |
          docker rm -f aiter_build_${{ matrix.python_version }} || true
