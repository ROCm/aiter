name: Op Performance Bench

# Trigger: PR with ci:perf label, push to main, or manual
on:
  push:
    branches: [main]
    paths:
      - 'aiter/ops/**'
      - 'op_tests/op_benchmarks/**'
  pull_request:
    types: [labeled]
    branches: [main]
  workflow_dispatch:
    inputs:
      benchmarks:
        description: 'Comma-separated benchmarks to run (gemm,attention,moe,rmsnorm,rope) or "all"'
        required: false
        default: 'auto'
      batch_sizes:
        description: 'Batch sizes to benchmark (comma-separated)'
        required: false
        default: '1,16,256,4096'

concurrency:
  group: perf-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOCKER_IMAGE: "rocm/pytorch:latest"
  GPU_ARCH_LIST: "gfx942;gfx950"
  GITHUB_REPO_URL: ${{ github.event.pull_request.head.repo.clone_url || 'https://github.com/ROCm/aiter.git' }}
  GITHUB_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  check-trigger:
    # Only run on PRs with ci:perf or ci:all label, or on push/dispatch
    if: >-
      github.event_name != 'pull_request' ||
      contains(github.event.pull_request.labels.*.name, 'ci:perf') ||
      contains(github.event.pull_request.labels.*.name, 'ci:all')
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.check.outputs.should_run }}
    steps:
      - id: check
        run: echo "should_run=true" >> $GITHUB_OUTPUT

  perf-bench:
    needs: check-trigger
    if: needs.check-trigger.outputs.should_run == 'true'
    runs-on: aiter-1gpu-runner
    timeout-minutes: 60

    steps:
      - name: Checkout aiter
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need parent commit for diff

      - name: Sync submodules
        run: |
          git submodule sync
          git submodule update --init --recursive --depth 1 --jobs 4

      - name: Clean up ROCm processes
        run: ./.github/scripts/clean_up_rocm.sh

      - name: Start container
        run: |
          docker run -dt \
            --device=/dev/dri \
            --device=/dev/kfd \
            --shm-size=16G \
            --group-add $(getent group render | cut -d: -f3) \
            --group-add $(getent group video | cut -d: -f3) \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            --name perf_bench \
            ${{ env.DOCKER_IMAGE }}

      - name: Build AITER
        run: |
          docker exec -w /workspace perf_bench \
            bash -c "BUILD_TRITON=0 ./.github/scripts/build_aiter_triton.sh"

      - name: Run performance benchmarks
        run: |
          BENCH_FILTER="${{ github.event.inputs.benchmarks || 'auto' }}"
          docker exec \
            -w /workspace \
            -e GITHUB_SHA="${{ env.GITHUB_COMMIT_SHA }}" \
            -e GITHUB_HEAD_REF="${{ github.head_ref || '' }}" \
            perf_bench \
            bash ./.github/scripts/op_perf_bench.sh "$BENCH_FILTER" "perf_results"

      - name: Upload perf results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results-${{ github.sha }}
          path: perf_results/
          retention-days: 90

      - name: Compare with baseline (main branch)
        if: github.event_name == 'pull_request'
        run: |
          docker exec -w /workspace perf_bench \
            python3 ./.github/scripts/perf_compare.py \
              --current perf_results/combined_results.csv \
              --output perf_results/comparison.md
        continue-on-error: true

      - name: Post perf results to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '## Operator Performance Results\n\n';

            // Read comparison if available
            try {
              const comparison = fs.readFileSync('perf_results/comparison.md', 'utf8');
              body += comparison;
            } catch (e) {
              body += '_Baseline comparison not available (first run or no previous data)._\n';
            }

            // Read metadata
            try {
              const meta = JSON.parse(fs.readFileSync('perf_results/metadata.json', 'utf8'));
              body += `\n\n**GPU**: ${meta.gpu} (${meta.gpu_arch})\n`;
              body += `**Commit**: \`${meta.commit}\`\n`;
              body += `**Timestamp**: ${meta.timestamp}\n`;
            } catch (e) {}

            body += '\n\n<sub>Generated by Op Performance Bench CI</sub>';

            // Find and update existing comment or create new
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });

            const botComment = comments.find(c =>
              c.body.includes('Operator Performance Results')
            );

            if (botComment) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: botComment.id,
                body: body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body: body,
              });
            }

      - name: Cleanup
        if: always()
        run: docker rm -f perf_bench || true

      - name: Clean up ROCm processes
        if: always()
        run: ./.github/scripts/clean_up_rocm.sh
