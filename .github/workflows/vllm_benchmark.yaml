name: vLLM Benchmark

on:
  push:
    branches: [main]
  pull_request:
    types: [labeled, synchronize]
    branches: [main]
  workflow_dispatch:
    inputs:
      benchmark_mode:
        description: Benchmark suite to run for manual dispatch
        required: false
        default: standard latency benchmark
        type: choice
        options:
          - standard latency benchmark
          - performance benchmark (only kimi 2.5 is supported)
          - all benchmarks
      docker_image:
        description: Base Docker image to benchmark against (supports private images)
        required: false
        default: rocm/vllm-dev:nightly
        type: string
      kimi_host_hf_hub_cache:
        description: Optional host HuggingFace cache path for manual Kimi runs
        required: false
        default: ""
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  VLLM_BRANCH: "main"
  VLLM_REPOSITORY_URL: "https://github.com/vllm-project/vllm"
  BASE_IMAGE: rocm/vllm-dev:nightly@sha256:76968f79a118de308324483885aa6482e86d42db3f83a8c908cf293b7e3e497e
  DOCKER_PULL_MAX_ATTEMPTS: "3"
  DOCKER_PULL_RETRY_DELAY_SECONDS: "10"
  AITER_WHEEL_ARTIFACT_NAME: aiter-vllm-whl-${{ github.run_id }}
  GITHUB_REPO_URL: ${{ github.event.pull_request.head.repo.clone_url || 'https://github.com/ROCm/aiter.git' }}
  GITHUB_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  check-signal:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.benchmark_mode != 'performance benchmark (only kimi 2.5 is supported)') ||
      (github.event_name != 'workflow_dispatch' &&
      (github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      (contains(github.event.pull_request.labels.*.name, 'ci:vllm') ||
      contains(github.event.pull_request.labels.*.name, 'ci:all')))))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and check signal artifact
        run: ./.github/scripts/check_signal.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}

  build_aiter_wheel:
    name: Build Aiter wheel
    if: >-
      (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.benchmark_mode != 'performance benchmark (only kimi 2.5 is supported)') ||
      (github.event_name != 'workflow_dispatch' &&
      (github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      (contains(github.event.pull_request.labels.*.name, 'ci:vllm') ||
      contains(github.event.pull_request.labels.*.name, 'ci:all')))))
    needs: check-signal
    runs-on: build-only-aiter
    steps:
      - name: Checkout aiter repo
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Sync submodules
        run: |
          set -e
          git submodule sync
          git submodule update --init --recursive --depth 1 --jobs 4

      - name: Docker login
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          for attempt in 1 2 3; do
            if echo "$DOCKER_PASSWORD" | docker login -u rocmshared --password-stdin; then
              echo "Docker login succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Docker login attempt ${attempt} failed"
            if [ "${attempt}" != 3 ]; then
              sleep 10
            fi
          done
          echo "Docker login failed after 3 attempts, continuing anyway"
          exit 0

      - name: Build Aiter wheel in vLLM base image
        run: |
          set -euo pipefail
          bash .github/scripts/docker_pull_with_retry.sh "${{ env.BASE_IMAGE }}"
          docker run --rm \
            --network=host \
            -v "${{ github.workspace }}:/workspace" \
            -w /workspace \
            ${{ env.BASE_IMAGE }} \
            bash -lc '
              set -euo pipefail
              git config --global --add safe.directory /workspace
              shopt -s nullglob
              rm -rf dist build aiter_meta ./*.egg-info
              pip uninstall -y aiter amd-aiter || true
              pip config set global.default-timeout 60
              pip config set global.retries 10
              pip config set global.index-url https://ausartifactory.amd.com/artifactory/api/pypi/hw-cpe-prod-remote/simple
              pip install -r requirements.txt
              pip install --upgrade pandas pyzmq einops numpy==1.26.2
              pip install --upgrade "pybind11>=3.0.1"
              pip install --upgrade "ninja>=1.11.1"
              pip install --upgrade "setuptools_scm[toml]>=6.2" wheel packaging psutil
              pip install tabulate
              python setup.py bdist_wheel
              ls -lh dist/*.whl
            '

      - name: Upload wheel as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.AITER_WHEEL_ARTIFACT_NAME }}
          path: dist/*.whl
          retention-days: 14

  vllm_benchmark:
    name: vLLM Benchmark (8 GPU)
    timeout-minutes: 60
    if: >-
      (github.event_name == 'workflow_dispatch' &&
      github.event.inputs.benchmark_mode != 'performance benchmark (only kimi 2.5 is supported)') ||
      (github.event_name != 'workflow_dispatch' &&
      (github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      (contains(github.event.pull_request.labels.*.name, 'ci:vllm') ||
      contains(github.event.pull_request.labels.*.name, 'ci:all')))))
    needs: build_aiter_wheel
    runs-on: linux-aiter-mi300x-8
    strategy:
      fail-fast: false
      matrix:
        include:
          - model: openai/gpt-oss-120b
            kv_cache_dtype: fp8_kvcache
            tp: 8
            extra_args: --gpu-memory-utilization 0.3
            extra_env_args: ""
          - model: deepseek-ai/DeepSeek-R1-0528
            kv_cache_dtype: default_kvcache
            tp: 8
            extra_args: --block-size 1
            extra_env_args: ""

    steps:
      - name: Checkout benchmark helpers
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          sparse-checkout: |
            .github/scripts

      - name: Download Aiter wheel artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.AITER_WHEEL_ARTIFACT_NAME }}
          path: aiter_wheels

      - name: Docker login
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          for attempt in 1 2 3; do
            if echo "$DOCKER_PASSWORD" | docker login -u rocmshared --password-stdin; then
              echo "Docker login succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Docker login attempt ${attempt} failed"
            if [ "${attempt}" != 3 ]; then
              sleep 10
            fi
          done
          echo "Docker login failed after 3 attempts, continuing anyway"
          exit 0

      - name: Prepare benchmark filenames
        id: prep
        run: |
          set -euo pipefail
          safe_model=$(echo '${{ matrix.model }}' | sed 's#[^A-Za-z0-9._-]#_#g')
          result_prefix="${safe_model}_kv_${{ matrix.kv_cache_dtype }}"
          echo "result_prefix=${result_prefix}" >> "$GITHUB_OUTPUT"

      - name: Download the vLLM base image
        run: |
          bash .github/scripts/docker_pull_with_retry.sh "${{ env.BASE_IMAGE }}"

      - name: Run benchmarks
        run: |
          set -euxo pipefail
          echo "Starting benchmark for model: ${{ matrix.model }} with kv_cache_dtype: ${{ matrix.kv_cache_dtype }}"

          mkdir -p benchmark_results
          result_prefix="${{ steps.prep.outputs.result_prefix }}"
          logFile="benchmark_results/${result_prefix}.log"

          MODEL_MOUNT=""
          if [ -d "/models" ]; then
            MODEL_MOUNT="-v /models:/models"
            echo "Using host model cache mount: /models"
          else
            echo "Warning: /models directory not found on runner; using remote model path."
          fi

          extraArgs="${{ matrix.extra_args }}"
          if [[ -n "${{ matrix.kv_cache_dtype }}" && "${{ matrix.kv_cache_dtype }}" == "fp8_kvcache" ]]; then
            extraArgs="${extraArgs} --kv-cache-dtype fp8"
          fi

          docker run --rm --device=/dev/kfd --device=/dev/dri --group-add video \
              --ulimit core=0:0 --ulimit memlock=-1:-1 --ulimit stack=67108864 --cap-add=SYS_PTRACE \
              --network=host --security-opt seccomp=unconfined --shm-size=16G \
              $MODEL_MOUNT \
              -v "${{ github.workspace }}:/workspace" -w /workspace \
              -e HF_TOKEN=${{ secrets.HF_TOKEN_TEST }} -e VLLM_ROCM_USE_AITER=1 \
              ${{ matrix.extra_env_args }} \
              ${{ env.BASE_IMAGE }} bash -lc "
                set -euo pipefail
                shopt -s nullglob
                wheels=(/workspace/aiter_wheels/*.whl)
                if [ \"\${#wheels[@]}\" -ne 1 ]; then
                  echo \"::error::Expected exactly one Aiter wheel artifact, found \${#wheels[@]}\"
                  exit 1
                fi
                ls -lh /workspace/aiter_wheels
                pip uninstall -y aiter amd-aiter || true
                pip install --no-deps \"\${wheels[0]}\"
                pip show amd-aiter || pip show aiter
                if [ -d \"/models/${{ matrix.model }}\" ]; then
                  model_path=\"/models/${{ matrix.model }}\"
                  echo \"Using cached model path: \${model_path}\"
                else
                  model_path=\"${{ matrix.model }}\"
                  echo \"Using remote model path: \${model_path}\"
                fi
                python -m vllm.entrypoints.cli.main bench latency \
                  --model \"\${model_path}\" \
                  --batch-size 123 --input-len 456 --output-len 78 \
                  --num-iters-warmup 3 --num-iters 10 \
                  -tp ${{ matrix.tp }} --load-format dummy ${extraArgs}
              " |& tee "${logFile}"

      - name: Ensure benchmark artifacts exist
        if: always()
        run: |
          mkdir -p benchmark_results
          if ! compgen -G "benchmark_results/*" > /dev/null; then
            echo "No benchmark output was generated." > benchmark_results/README.txt
          fi

      - name: Upload benchmark output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vllm-benchmark-${{ steps.prep.outputs.result_prefix }}
          path: benchmark_results/
          retention-days: 7

      - name: Clean up
        if: always()
        run: |
          docker rmi ${{ env.BASE_IMAGE }} || true

  vllm_kimi_serve_benchmark:
    name: vLLM Kimi Serve Benchmark (4 GPU)
    timeout-minutes: 240
    if: >-
      github.event_name == 'workflow_dispatch' &&
      (github.event.inputs.benchmark_mode == 'performance benchmark (only kimi 2.5 is supported)' ||
      github.event.inputs.benchmark_mode == 'all benchmarks')
    runs-on: linux-aiter-mi300x-8
    steps:
      - name: Checkout benchmark helpers
        uses: actions/checkout@v6
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          sparse-checkout: |
            .github/scripts

      - name: Docker login
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          for attempt in 1 2 3; do
            if echo "$DOCKER_PASSWORD" | docker login -u rocmshared --password-stdin; then
              echo "Docker login succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Docker login attempt ${attempt} failed"
            if [ "${attempt}" != 3 ]; then
              sleep 10
            fi
          done
          echo "Docker login failed after 3 attempts, continuing anyway"
          exit 0

      - name: Prepare Kimi benchmark directories
        run: |
          set -euo pipefail
          mkdir -p benchmark_results/kimi_serve

      - name: Download the vLLM base image
        run: |
          bash .github/scripts/docker_pull_with_retry.sh "${{ env.BASE_IMAGE }}"

      - name: Start Kimi serve container
        env:
          KIMI_CONTAINER_NAME: vllm-kimi-tp4
          KIMI_HOST_HF_HUB_CACHE: ${{ github.event.inputs.kimi_host_hf_hub_cache }}
        run: |
          set -euxo pipefail
          docker rm -f "${KIMI_CONTAINER_NAME}" || true

          docker_args=(
            --rm
            -d
            --name "${KIMI_CONTAINER_NAME}"
            -e VLLM_ROCM_USE_AITER=1
            -e VLLM_ROCM_QUICK_REDUCE_QUANTIZATION=INT4
            -e VLLM_ROCM_USE_AITER_FUSION_SHARED_EXPERTS=1
            -e VLLM_ROCM_USE_AITER_FUSED_AR_RMSNORM=1
            -e VLLM_ROCM_AITER_FUSED_MLA_DECODE=1
            -e HIP_VISIBLE_DEVICES=4,5,6,7
            -e HF_HUB_CACHE=/root/.cache/huggingface/hub
            -e HF_TOKEN=${{ secrets.HF_TOKEN_TEST }}
            --entrypoint ""
            --network host
            --ipc host
            --device /dev/dri:/dev/dri
            --device /dev/kfd:/dev/kfd
            --group-add video
            --security-opt apparmor=unconfined
            --security-opt seccomp=unconfined
            --shm-size 128G
            -v "${{ github.workspace }}/benchmark_results:/benchmark_results"
          )

          if [ -n "${KIMI_HOST_HF_HUB_CACHE}" ]; then
            if [ -d "${KIMI_HOST_HF_HUB_CACHE}" ]; then
              echo "Using host HF hub cache: ${KIMI_HOST_HF_HUB_CACHE}"
              docker_args+=(-v "${KIMI_HOST_HF_HUB_CACHE}:/root/.cache/huggingface/hub")
            else
              echo "Warning: host HF hub cache path not found: ${KIMI_HOST_HF_HUB_CACHE}"
            fi
          fi

          docker run "${docker_args[@]}" "${{ env.BASE_IMAGE }}" \
            vllm serve amd/Kimi-K2.5-MXFP4 \
              --port 8006 \
              --tensor-parallel-size 4 \
              --max-model-len 14976 \
              --max-num-batched-tokens 16384 \
              --gpu-memory-utilization 0.95 \
              --kv-cache-dtype fp8 \
              --no-enable-prefix-caching \
              --trust-remote-code

      - name: Run Kimi serve benchmark sweep
        env:
          KIMI_CONTAINER_NAME: vllm-kimi-tp4
          PORT: "8006"
          MODEL: amd/Kimi-K2.5-MXFP4
          RESULTS: /benchmark_results/kimi_serve
        run: |
          set -euxo pipefail
          docker exec \
            -e PORT="${PORT}" \
            -e MODEL="${MODEL}" \
            -e RESULTS="${RESULTS}" \
            "${KIMI_CONTAINER_NAME}" bash -lc '
          mkdir -p "${RESULTS}"
          sweep=(
            "1000 100 4 1 4 32"
            "5000 500 4 3 4 32"
            "10000 1000 4 2 4 32"
            "1000 100 8 4 8 64"
            "5000 500 8 6 8 64"
            "10000 1000 8 5 8 64"
            "1000 100 16 7 16 96"
            "5000 500 16 9 16 96"
            "10000 1000 16 8 16 96"
            "1000 100 32 10 32 128"
            "5000 500 32 12 32 128"
            "10000 1000 32 11 32 128"
            "1000 100 64 13 64 256"
            "5000 500 64 15 64 256"
            "10000 1000 64 14 64 256"
            "1000 100 128 16 128 384"
            "5000 500 128 18 128 384"
            "10000 1000 128 17 128 384"
            "1000 100 256 19 256 768"
            "5000 500 256 21 256 768"
            "10000 1000 256 20 256 768"
            "1000 100 512 22 512 1536"
            "5000 500 512 24 512 1536"
            "10000 1000 512 23 512 1536"
          )
          for row in "${sweep[@]}"; do
            read isl osl conc seed warm np <<<"${row}"
            out="${RESULTS}/isl${isl}_osl${osl}_c${conc}.json"
            echo "=== ISL=${isl} OSL=${osl} conc=${conc} np=${np} warm=${warm} seed=${seed} ==="
            vllm bench serve \
              --backend vllm \
              --host 127.0.0.1 --port "${PORT}" \
              --model "${MODEL}" \
              --dataset-name random \
              --random-input-len "${isl}" \
              --random-output-len "${osl}" \
              --max-concurrency "${conc}" \
              --num-prompts "${np}" \
              --num-warmups "${warm}" \
              --seed "${seed}" \
              --ignore-eos \
              --trust-remote-code \
              --percentile-metrics ttft,tpot,itl,e2el \
              --ready-check-timeout-sec 7200 \
              --save-result \
              --result-filename "${out}"
          done
          '

      - name: Collect Kimi serve logs
        if: always()
        env:
          KIMI_CONTAINER_NAME: vllm-kimi-tp4
        run: |
          mkdir -p benchmark_results
          docker logs "${KIMI_CONTAINER_NAME}" > benchmark_results/kimi_serve_server.log 2>&1 || true

      - name: Ensure benchmark artifacts exist
        if: always()
        run: |
          mkdir -p benchmark_results
          if ! compgen -G "benchmark_results/*" > /dev/null; then
            echo "No benchmark output was generated." > benchmark_results/README.txt
          fi

      - name: Upload Kimi benchmark output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vllm-kimi-serve-benchmark
          path: benchmark_results/
          retention-days: 7

      - name: Clean up
        if: always()
        env:
          KIMI_CONTAINER_NAME: vllm-kimi-tp4
        run: |
          docker rm -f "${KIMI_CONTAINER_NAME}" || true
          docker rmi "${{ env.BASE_IMAGE }}" || true
