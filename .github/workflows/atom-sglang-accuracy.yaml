name: Atom SGLang Accuracy

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, labeled]
    branches: [main]
    paths-ignore:
      - '**/*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  ATOM_BRANCH: "main"
  ATOM_REPOSITORY_URL: "ROCm/ATOM"
  ATOM_REPO_URL: "https://github.com/ROCm/ATOM.git"
  AITER_REPO_URL: ${{ github.event.pull_request.head.repo.clone_url || 'https://github.com/ROCm/aiter.git' }}
  AITER_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.sha }}
  NIGHTLY_SGLANG_IMAGE_TAG: "rocm/atom-dev:sglang-latest"
  GPU_ARCHS: "gfx942;gfx950"
  DOCKER_PULL_MAX_ATTEMPTS: "3"
  DOCKER_PULL_RETRY_DELAY_SECONDS: "10"

jobs:
  check-signal:
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      contains(github.event.pull_request.labels.*.name, 'ci:atom_full'))
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and check signal artifact
        run: ./.github/scripts/check_signal.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}

  load-sglang-models:
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      contains(github.event.pull_request.labels.*.name, 'ci:atom_full'))
    runs-on: ubuntu-latest
    outputs:
      models_json: ${{ steps.models.outputs.models_json }}
    steps:
      - name: Checkout ATOM model configs
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ATOM_REPOSITORY_URL }}
          ref: ${{ env.ATOM_BRANCH }}

      - name: Load ATOM SGLang accuracy matrix
        id: models
        run: |
          python3 <<'PY'
          import json
          import os
          import re

          def artifact_name(name):
              safe = re.sub(r"[^A-Za-z0-9._-]+", "_", name).strip("_")
              return safe[:200] or "model"

          with open(".github/benchmark/sglang_models_accuracy.json", encoding="utf-8") as f:
              models = json.load(f)

          selected = []
          for model in models:
              selected.append({
                  "model_name": model["model_name"],
                  "model_path": model["model_path"],
                  "extra_args": model.get("extraArgs", ""),
                  "env_vars": model.get("env_vars", ""),
                  "runner": model["runner"],
                  "accuracy_test_threshold": str(model.get("accuracy_threshold", 0)),
                  "artifact_name": artifact_name(model["model_name"]),
              })

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as out:
              out.write(f"models_json={json.dumps(selected)}\n")

          print(f"Selected {len(selected)} ATOM SGLang accuracy model(s)")
          PY

  atom-sglang-accuracy:
    needs: [check-signal, load-sglang-models]
    if: >-
      github.event_name != 'pull_request' ||
      (github.event.pull_request.draft == false &&
      contains(github.event.pull_request.labels.*.name, 'ci:atom_full'))
    name: Accuracy (${{ matrix.model_name }})
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.load-sglang-models.outputs.models_json) }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    env:
      CONTAINER_NAME: atom_sglang_aiter_${{ strategy.job-index }}
      IMAGE_TAG: atom_sglang_aiter:ci-${{ github.run_id }}-${{ strategy.job-index }}
    steps:
      - name: Checkout ATOM repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ATOM_REPOSITORY_URL }}
          ref: ${{ env.ATOM_BRANCH }}

      - name: Docker login
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u rocmshared --password-stdin || true

      - name: Download ATOM SGLang base image
        run: |
          for attempt in $(seq 1 "${DOCKER_PULL_MAX_ATTEMPTS}"); do
            if docker pull "${NIGHTLY_SGLANG_IMAGE_TAG}"; then
              echo "Docker pull succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Docker pull attempt ${attempt} failed"
            if [ "${attempt}" -lt "${DOCKER_PULL_MAX_ATTEMPTS}" ]; then
              sleep "${DOCKER_PULL_RETRY_DELAY_SECONDS}"
            fi
          done
          echo "Docker pull failed after ${DOCKER_PULL_MAX_ATTEMPTS} attempts"
          exit 1

      - name: Generate ATOM SGLang overlay Dockerfile
        run: |
          cat <<'EOF' > Dockerfile.mod
          ARG SGLANG_BASE_IMAGE
          FROM ${SGLANG_BASE_IMAGE}
          ARG AITER_REPO_URL
          ARG AITER_COMMIT_SHA
          ARG ATOM_REPO_URL
          ARG ATOM_BRANCH
          ARG GPU_ARCHS

          RUN pip install -U "lm-eval[api]" hf_transfer "pybind11>=3.0.1"

          RUN echo "=== Aiter version BEFORE uninstall ===" && pip show amd-aiter || true
          RUN pip uninstall -y amd-aiter || true
          RUN rm -rf /app/aiter-test
          RUN git clone "${AITER_REPO_URL}" /app/aiter-test && \
              cd /app/aiter-test && \
              git checkout "${AITER_COMMIT_SHA}" && \
              git submodule sync && git submodule update --init --recursive && \
              MAX_JOBS=64 PREBUILD_KERNELS=0 GPU_ARCHS="${GPU_ARCHS}" pip install -e . && \
              ./.github/scripts/install_triton.sh
          RUN echo "=== Aiter version AFTER installation ===" && pip show amd-aiter || true

          RUN echo "=== ATOM version BEFORE reinstall ===" && pip show atom || true
          RUN pip uninstall -y atom || true
          RUN rm -rf /app/ATOM
          RUN git clone "${ATOM_REPO_URL}" /app/ATOM && \
              cd /app/ATOM && \
              git checkout "${ATOM_BRANCH}" && \
              pip install -e . --no-deps
          RUN echo "=== ATOM/SGLang package versions ===" && pip show amd-aiter atom sglang torch triton mori || true
          EOF

      - name: Build ATOM SGLang test image
        run: |
          docker build --network=host \
            --no-cache \
            -t "${IMAGE_TAG}" \
            --build-arg SGLANG_BASE_IMAGE="${NIGHTLY_SGLANG_IMAGE_TAG}" \
            --build-arg AITER_REPO_URL="${AITER_REPO_URL}" \
            --build-arg AITER_COMMIT_SHA="${AITER_COMMIT_SHA}" \
            --build-arg ATOM_REPO_URL="${ATOM_REPO_URL}" \
            --build-arg ATOM_BRANCH="${ATOM_BRANCH}" \
            --build-arg GPU_ARCHS="${GPU_ARCHS}" \
            -f Dockerfile.mod .

      - name: Prepare model cache mount
        run: |
          if [ -d "/models" ]; then
            echo "MODEL_CACHE_MOUNT=-v /models:/models" >> "$GITHUB_ENV"
            echo "MODEL_CACHE_DESC=/models (host mount)" >> "$GITHUB_ENV"
          else
            echo "MODEL_CACHE_MOUNT=" >> "$GITHUB_ENV"
            echo "MODEL_CACHE_DESC=container-local /models (no host cache mount)" >> "$GITHUB_ENV"
          fi

      - name: Start ATOM SGLang container
        run: |
          echo "Clean up containers..."
          docker rm -f "$CONTAINER_NAME" 2>/dev/null || true

          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          echo "Using model cache backend: ${MODEL_CACHE_DESC}"
          cat > /tmp/sglang_env_file.txt << 'EOF'
          ${{ matrix.env_vars }}
          EOF

          docker run -dt --device=/dev/kfd $DEVICE_FLAG \
            -v "${GITHUB_WORKSPACE:-$PWD}":/workspace \
            $MODEL_CACHE_MOUNT \
            -w /workspace \
            --ipc=host --group-add video \
            --shm-size=16G \
            --privileged \
            --cap-add=SYS_PTRACE \
            --env-file /tmp/sglang_env_file.txt \
            -e HF_TOKEN="${HF_TOKEN:-${{ secrets.HF_TOKEN_TEST }}}" \
            --security-opt seccomp=unconfined \
            --ulimit memlock=-1 \
            --ulimit stack=67108864 \
            --name "$CONTAINER_NAME" \
            "$IMAGE_TAG"
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Download model
        timeout-minutes: 180
        run: |
          set -euo pipefail
          model_dir="/models/${{ matrix.model_path }}"
          if [ -n "${MODEL_CACHE_MOUNT}" ]; then
            model_use_lock="true"
            if [ "${{ matrix.runner }}" = "atom-mi355-8gpu.predownload" ]; then
              model_use_lock="false"
            fi
            if ! docker exec \
              -e HF_TOKEN="${HF_TOKEN:-${{ secrets.HF_TOKEN_TEST }}}" \
              -e MODEL_ID="${{ matrix.model_path }}" \
              -e TARGET_DIR="${model_dir}" \
              -e MODEL_USE_LOCK="${model_use_lock}" \
              -e MODEL_DOWNLOAD_TIMEOUT="${MODEL_DOWNLOAD_TIMEOUT}" \
              -e MODEL_LOCK_WAIT_SECONDS="${MODEL_LOCK_WAIT_SECONDS}" \
              -e MODEL_LOCK_POLL_INTERVAL="${MODEL_LOCK_POLL_INTERVAL}" \
              -e MODEL_PROGRESS_INTERVAL="${MODEL_PROGRESS_INTERVAL}" \
              "$CONTAINER_NAME" \
              bash -lc 'bash /workspace/.github/scripts/download_model_with_lock.sh "$MODEL_ID" "$TARGET_DIR"'; then
              echo "Model download failed for '${{ matrix.model_path }}'. Aborting."
              exit 1
            fi
            echo "SGLANG_RESOLVED_MODEL_PATH=${model_dir}" >> "$GITHUB_ENV"
          else
            echo "/models directory not mounted; using Hugging Face model id"
            echo "SGLANG_RESOLVED_MODEL_PATH=${{ matrix.model_path }}" >> "$GITHUB_ENV"
          fi
        env:
          MODEL_DOWNLOAD_TIMEOUT: "3h"
          MODEL_LOCK_WAIT_SECONDS: "7200"
          MODEL_LOCK_POLL_INTERVAL: "30"
          MODEL_PROGRESS_INTERVAL: "60"

      - name: Run ATOM SGLang accuracy test
        timeout-minutes: 120
        env:
          SGLANG_MODEL_NAME: ${{ matrix.model_name }}
          SGLANG_MODEL_PATH: ${{ matrix.model_path }}
          SGLANG_EXTRA_ARGS: ${{ matrix.extra_args }}
          SGLANG_ENV_VARS: ${{ matrix.env_vars }}
          MAX_WAIT_RETRIES: "120"
          STREAM_SGLANG_LOGS: "1"
          LM_EVAL_TASK: "gsm8k"
        run: |
          docker exec \
            -e SGLANG_MODEL_NAME="${SGLANG_MODEL_NAME}" \
            -e SGLANG_MODEL_PATH="${SGLANG_RESOLVED_MODEL_PATH:-$SGLANG_MODEL_PATH}" \
            -e SGLANG_EXTRA_ARGS="${SGLANG_EXTRA_ARGS}" \
            -e SGLANG_ENV_VARS="${SGLANG_ENV_VARS}" \
            -e MAX_WAIT_RETRIES="${MAX_WAIT_RETRIES}" \
            -e STREAM_SGLANG_LOGS="${STREAM_SGLANG_LOGS}" \
            -e LM_EVAL_TASK="${LM_EVAL_TASK}" \
            "$CONTAINER_NAME" bash -lc "
              set -euo pipefail
              bash .github/scripts/atom_sglang_test.sh accuracy
            "

      - name: Check ATOM SGLang accuracy results
        if: success()
        run: |
          docker cp "$CONTAINER_NAME":/tmp/atom_sglang_accuracy_results ./atom_sglang_accuracy_results || true
          result_file=$(ls -1t atom_sglang_accuracy_results/*.json 2>/dev/null | head -n 1)
          if [ -z "$result_file" ] || [ ! -f "$result_file" ]; then
            echo "ERROR: No results JSON file found in atom_sglang_accuracy_results/"
            exit 2
          fi

          flexible_extract_value=$(jq '.results.gsm8k["exact_match,flexible-extract"]' "$result_file")
          echo "Flexible extract value: $flexible_extract_value"
          echo "Accuracy test threshold: ${{ matrix.accuracy_test_threshold }}"

          result=$(awk -v val="$flexible_extract_value" -v threshold="${{ matrix.accuracy_test_threshold }}" 'BEGIN {print (val < threshold) ? 1 : 0}')
          if [ "$result" -eq 1 ]; then
            echo "Accuracy test failed: Flexible extract value $flexible_extract_value is less than threshold ${{ matrix.accuracy_test_threshold }}."
            exit 1
          fi

      - name: Collect ATOM SGLang artifacts
        if: always()
        run: |
          docker cp "$CONTAINER_NAME":/tmp/atom_sglang.log ./atom_sglang.log || true
          docker cp "$CONTAINER_NAME":/tmp/atom_sglang_accuracy_output.txt ./atom_sglang_accuracy_output.txt || true
          docker cp "$CONTAINER_NAME":/tmp/atom_sglang_accuracy_results ./atom_sglang_accuracy_results || true

      - name: Upload ATOM SGLang artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: atom-sglang-${{ matrix.artifact_name }}-artifacts
          path: |
            atom_sglang.log
            atom_sglang_accuracy_output.txt
            atom_sglang_accuracy_results
          retention-days: 7

      - name: Clean Up
        if: always()
        run: |
          docker exec "$CONTAINER_NAME" bash -lc "if [ -f /tmp/atom_sglang.pid ]; then kill \$(cat /tmp/atom_sglang.pid) || true; fi" || true
          docker stop "$CONTAINER_NAME" || true
          docker rm "$CONTAINER_NAME" || true
          docker rmi "$IMAGE_TAG" || true
          rm -f Dockerfile.mod || true
