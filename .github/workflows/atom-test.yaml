name: Atom Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  ATOM_BRANCH: "main"
  ATOM_REPOSITORY_URL: "https:/github.com/ROCM/ATOM"
  BASE_IMAGE: "rocm/pytorch:latest"
  GITHUB_REPO_URL: ${{ github.event.pull_request.head.repo.clone_url || 'https://github.com/ROCm/ATOM.git' }}
  GITHUB_COMMIT_SHA: ${{ github.event.pull_request.head.sha || github.event.head_commit.id }}

jobs:
  check-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download and check signal artifact
        run: ./.github/scripts/check_signal.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}

  build_atom_image:
    needs: check-signal
    runs-on: aiter-k8s-build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ATOM_REPOSITORY_URL }}
          branch: ${{ env.ATOM_BRANCH }}

      - name: Download the ATOM base image
        run: |
          docker pull ${{ env.BASE_IMAGE }}

      - name: Build the ATOM test image
        run: |
          docker build --network=host \
            --no-cache \
            -t rocm/aiter-ci:atom-test-${{ env.GITHUB_COMMIT_SHA }} \
            --build-arg BASE_IMAGE=${{ env.BASE_IMAGE }} \
            --build-arg PREBUILD_KERNELS=0 \
            --build-arg GPU_ARCH=gfx950 \
            --build-arg ATITER_REPO=${{ env.GITHUB_REPO_URL }} \
            --build-arg ATITER_COMMIT=${{ env.GITHUB_COMMIT_SHA }} \
            -f docker/Dockerfile .

      - name: Push the ATOM test image
        run: |
          docker push rocm/aiter-ci:atom-test-${{ env.GITHUB_COMMIT_SHA }}

  atom:
    needs: build_atom_image
    runs-on: aiter-8gpu-runner
    strategy:
      fail-fast: false
      matrix:
        include:
          - model_name: "DeepSeek-R1-0528"
            model_path: "deepseek-ai/DeepSeek-R1-0528"
            extraArgs: "--kv_cache_dtype fp8 -tp 8"
            env_vars: ""
          - model_name: "gpt-oss-120b"
            model_path: "openai/gpt-oss-120b"
            extraArgs: "--kv_cache_dtype fp8"
            env_vars: |
              ATOM_GPT_OSS_MODEL=1
     
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          repository: ${{ env.ATOM_REPOSITORY_URL }}
          branch: ${{ env.ATOM_BRANCH }}

      - name: Download the ATOM test image
        run: |
          docker pull rocm/aiter-ci:atom-test-${{ env.GITHUB_COMMIT_SHA }}
        
      - name: Start CI container
        run: |
          echo "Clean up containers..."
          docker ps -aq -f name=atom_test | xargs -r docker stop | xargs -r docker rm

          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          cat > /tmp/env_file.txt << 'EOF'
          ${{ matrix.env_vars }}
          EOF

          echo "Starting container: rocm/aiter-ci:atom-test-${{ env.GITHUB_COMMIT_SHA }}"
          echo "Model-specific environment variables for ${{ matrix.model_name }}:"
          cat /tmp/env_file.txt

          docker run -dt --device=/dev/kfd $DEVICE_FLAG \
          -v "${GITHUB_WORKSPACE:-$PWD}":/workspace \
          -w /workspace \
          --ipc=host --group-add video \
          --shm-size=16G \
          --privileged \
          --cap-add=SYS_PTRACE \
          --env-file /tmp/env_file.txt \
          --security-opt seccomp=unconfined \
          --ulimit memlock=-1 \
          --ulimit stack=67108864 \
          -v "${{ github.workspace }}:/workspace" \
          -w /workspace \
          --name atom_test \
          atom_test:ci
        env:
          GITHUB_WORKSPACE: ${{ github.workspace }}

      - name: Check shm size
        run: |
          docker exec atom_test df -h /dev/shm

      - name: Run ATOM simple inference
        timeout-minutes: 30
        run: |
          # Run the inference and capture output
          set -euo pipefail
          echo ""
          echo "========== Running test =========="
  
          model_path="${{ matrix.model_path }}"
          echo "Model path: $model_path"

          docker exec atom_test bash -lc "
            set -euo pipefail
            python3 -m atom.examples.simple_inference \
              --model \"$model_path\" \
              ${{ matrix.extraArgs }} \
              --temperature 0 \
            | grep -E '^Prompt: |^Completion:'
          " > atom_test_output.txt
          
          echo ""
          echo "========== Showing test output below =========="
          cat atom_test_output.txt
        
      - name: Run ATOM accuracy test
        timeout-minutes: 30
        run: |
          set -euo pipefail
          echo ""
          echo "========== Launching ATOM server =========="
          model_path="${{ matrix.model_path }}"
          docker exec atom_test bash -lc "
            .github/scripts/atom_test.sh launch $model_path ${{ matrix.extraArgs }}
          "
          echo ""
          echo "========== Running accuracy test =========="
          docker exec atom_test bash -lc "
            .github/scripts/atom_test.sh accuracy $model_path
          "

      - name: Upload output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.model_name }}_atom_test_output.txt
          path: atom_test_output.txt

      - name: Clean Up
        if: always()
        run: |
          docker stop atom_test || true
          docker rm atom_test || true
