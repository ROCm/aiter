name: FFM Aiter UT

run-name: FFM aiter UT on ${{ inputs.runner || 'aiter-1gpu-runner' }}

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - "aiter/ops/triton/**"
      - "op_tests/triton_tests/**"
      - ".github/workflows/ffm-bringup.yaml"
  workflow_dispatch:
    inputs:
      runner:
        description: Self-hosted MI350 runner label to use for the FFM UT.
        required: true
        default: aiter-1gpu-runner
        type: string
      docker_image:
        description: FFM image to pull and test.
        required: true
        default: rocm/ffm-dev:latest
        type: string

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.runner || 'aiter-1gpu-runner' }}
  cancel-in-progress: true

env:
  FFM_IMAGE: ${{ inputs.docker_image || 'rocm/ffm-dev:latest' }}
  FFM_TEST: op_tests/triton_tests/gemm/basic/test_gemm_a16w16.py
  FFM_TEST_NODE_PATTERN: '::(test_gemm_a16_w16\[(bandwidth_bound|compute_bound)-gluon-64-2880-4096\]|test_gemm_a16_w16_layout\[(bandwidth_bound|compute_bound)-gluon-(TT|NN|NT)-64-2880-4096\]|test_gemm_a16_w16_atomic\[(True|False)-64-2880-4096\])$'

jobs:
  check-signal:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Checks workflow
        run: ./.github/scripts/check_signal.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}

  ffm-aiter-ut:
    name: FFM Aiter UT (${{ inputs.runner || 'aiter-1gpu-runner' }})
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    needs: [check-signal]
    runs-on: ${{ inputs.runner || 'aiter-1gpu-runner' }}
    timeout-minutes: 60
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 0

      - name: Docker login
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${DOCKER_PASSWORD}" ]; then
            echo "::error::Missing DOCKER_PASSWORD secret required to pull ${FFM_IMAGE}"
            exit 1
          fi
          DOCKER_USER="${DOCKERHUB_USERNAME:-rocmshared}"
          for attempt in 1 2 3; do
            if echo "${DOCKER_PASSWORD}" | docker login -u "${DOCKER_USER}" --password-stdin; then
              echo "Docker login succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Docker login attempt ${attempt} failed"
            if [ "${attempt}" != 3 ]; then
              sleep 10
            fi
          done
          echo "::error::Docker login failed after 3 attempts"
          exit 1

      - name: Pull FFM image
        run: |
          set -euo pipefail
          docker pull "${FFM_IMAGE}"

      - name: Run selected existing aiter FFM unit tests
        run: |
          set -euo pipefail

          DEVICE_FLAG="--device /dev/dri"
          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG="$(cat /etc/podinfo/gha-render-devices)"
          fi

          GROUP_FLAGS=""
          for group in video render; do
            gid="$(getent group "${group}" | cut -d: -f3 || true)"
            if [ -n "${gid}" ]; then
              GROUP_FLAGS="${GROUP_FLAGS} --group-add ${gid}"
            fi
          done

          docker run --rm \
            --device /dev/kfd ${DEVICE_FLAG} \
            ${GROUP_FLAGS} \
            --cap-add=SYS_PTRACE \
            --security-opt seccomp=unconfined \
            --shm-size=16gb \
            -e FFM_TEST="${FFM_TEST}" \
            -e FFM_TEST_NODE_PATTERN="${FFM_TEST_NODE_PATTERN}" \
            -v "${GITHUB_WORKSPACE}:/workspace" \
            -w /workspace \
            "${FFM_IMAGE}" \
            bash -lc '
              set -euo pipefail
              source /ffm/ffmlite_env.sh
              cd /workspace
              git config --global --add safe.directory /workspace

              echo "==== Runtime context ===="
              echo "pwd: $(pwd)"
              echo "aiter checkout: $(git rev-parse HEAD)"
              echo "FFM_TEST=${FFM_TEST}"
              echo "FFM_TEST_NODE_PATTERN=${FFM_TEST_NODE_PATTERN}"
              echo "PATH=${PATH}"
              echo "PYTHONPATH=${PYTHONPATH:-}"

              export ENABLE_CK=0
              export AITER_TRITON_ONLY=1
              export AITER_USE_SYSTEM_TRITON=1
              export PIP_BREAK_SYSTEM_PACKAGES=1
              echo "ENABLE_CK=${ENABLE_CK}"
              echo "AITER_TRITON_ONLY=${AITER_TRITON_ONLY}"
              echo "AITER_USE_SYSTEM_TRITON=${AITER_USE_SYSTEM_TRITON}"

              echo "==== Python packages before reinstall ===="
              python3 -m pip show torch triton amd-triton triton-kernels amd-aiter aiter || true

              echo "==== Reinstall mounted aiter checkout ===="
              python3 -m pip uninstall -y amd-aiter aiter || true
              python3 -m pip install --break-system-packages --no-build-isolation -e .

              echo "==== Python packages after reinstall ===="
              python3 -m pip show torch triton amd-triton triton-kernels amd-aiter aiter || true
              python3 -m pip uninstall -y pylama || true

              echo "==== Select existing FFM test cases ===="
              FFM_COLLECTED="$(python3 -m pytest --collect-only -q "${FFM_TEST}")"
              mapfile -t FFM_TEST_NODES < <(grep -E "${FFM_TEST_NODE_PATTERN}" <<< "${FFM_COLLECTED}" || true)
              printf "%s\n" "${FFM_TEST_NODES[@]}"
              if [ "${#FFM_TEST_NODES[@]}" -eq 0 ]; then
                echo "::error::No FFM test nodes matched ${FFM_TEST_NODE_PATTERN}"
                exit 1
              fi
              echo "Selected ${#FFM_TEST_NODES[@]} existing test node(s)"

              echo "==== Run selected existing FFM unit tests ===="
              python3 -m pytest -v "${FFM_TEST_NODES[@]}"
            '

      - name: Cleanup
        if: always()
        run: |
          docker logout 2>/dev/null || true
          docker rmi "${FFM_IMAGE}" 2>/dev/null || true
