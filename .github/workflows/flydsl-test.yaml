name: FlyDSL Test

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    branches: [main]
    paths:
      - "aiter/ops/flydsl/**"
      - "aiter/aot/flydsl/**"
      - "op_tests/flydsl_tests/**"
      - ".github/workflows/flydsl-test.yaml"
      - ".github/scripts/split_tests.sh"
      - ".github/scripts/build_aiter_triton.sh"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check-signal:
    if: ${{ !github.event.pull_request || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Wait for Checks workflow
        run: ./.github/scripts/check_signal.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}

  # Step 1: split flydsl tests into 2 shards (flydsl_shard_0.list ...).
  split_flydsl_tests:
    if: ${{ !github.event.pull_request || github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    needs: [check-signal]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Split FlyDSL Tests (2 shards)
        run: ./.github/scripts/split_tests.sh --shards 2 --test-type flydsl

      - name: Upload test shard lists as artifact
        uses: actions/upload-artifact@v4
        with:
          name: flydsl_shards
          path: flydsl_shard_*.list
          retention-days: 7

  # Step 2: MI35X (gfx950) matrix jobs. FlyDSL K5 carve-outs and the AOT
  # coverage are gfx950-specific, so we run on the MI35X runner.
  flydsl:
    if: ${{ !github.event.pull_request || github.event.pull_request.draft == false }}
    name: FlyDSL Tests (MI35X) / Shard ${{ matrix.shard }}
    runs-on: linux-aiter-mi35x-1
    needs: [split_flydsl_tests, check-signal]
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1]
    env:
      DOCKER_IMAGE: "rocm/pytorch:latest"
      # Skip the long-running benchmark class; CI runs correctness only.
      FLYDSL_TEST_FILTER: "not TestPerformance"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          submodules: 'recursive'

      - name: Download test shard lists
        uses: actions/download-artifact@v4
        timeout-minutes: 15
        with:
          name: flydsl_shards

      - name: List test shard files
        run: |
          ls -l flydsl_shard_*.list

      - name: Docker login
        if: ${{ github.event_name != 'pull_request' || !github.event.pull_request.head.repo.fork }}
        env:
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: |
          for attempt in 1 2 3; do
            if echo "$DOCKER_PASSWORD" | docker login -u rocmshared --password-stdin; then
              echo "Docker login succeeded on attempt ${attempt}"
              exit 0
            fi
            echo "Docker login attempt ${attempt} failed"
            if [ "${attempt}" != 3 ]; then
              sleep 10
            fi
          done
          echo "Docker login failed after 3 attempts, continuing anyway"
          exit 0

      - name: Export test file list for this shard as env
        id: set_shard_files
        run: |
          FLYDSL_TEST=$(cat flydsl_shard_${{ matrix.shard }}.list)
          echo "$FLYDSL_TEST"
          echo "FLYDSL_TEST=$FLYDSL_TEST" >> $GITHUB_ENV

      - name: Run the container
        run: |
          set -ex
          echo "Starting container: flydsl_test"

          if [ -f "/etc/podinfo/gha-render-devices" ]; then
            DEVICE_FLAG=$(cat /etc/podinfo/gha-render-devices)
          else
            DEVICE_FLAG="--device /dev/dri"
          fi

          docker run -dt \
          --device=/dev/kfd $DEVICE_FLAG \
          --shm-size=16G \
          --group-add $(getent group render | cut -d: -f3) \
          --group-add $(getent group video | cut -d: -f3) \
          -v "${{ github.workspace }}:/workspace" \
          -w /workspace \
          --name flydsl_test \
          ${{ env.DOCKER_IMAGE }}

      - name: Setup Aiter and Triton
        run: |
          set -ex
          echo "Setting up Aiter and Triton..."
          docker exec -w /workspace flydsl_test ./.github/scripts/build_aiter_triton.sh

      - name: FlyDSL Tests
        run: |
          set -ex
          echo "Running FlyDSL Tests (correctness only)..."
          docker exec -w /workspace flydsl_test mkdir -p test-reports
          docker exec -w /workspace flydsl_test \
            pytest -v ${FLYDSL_TEST} -k "${FLYDSL_TEST_FILTER}" \
            --junitxml=test-reports/flydsl.xml

      - name: Upload test logs
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: flydsl-test-shard-${{ matrix.shard }}
          path: test-reports/flydsl.xml
          retention-days: 7

      - name: Cleanup container
        if: always()
        run: |
          docker rm -f flydsl_test || true

  flydsl-test-finish:
    if: ${{ !github.event.pull_request || !github.event.pull_request.draft }}
    name: FlyDSL Test Results
    runs-on: ubuntu-latest
    needs: [flydsl]
    steps:
      - name: Download all test reports
        uses: actions/download-artifact@v4
        timeout-minutes: 15
        with:
          pattern: flydsl-test-shard-*
          path: .
      - name: Check FlyDSL Test Results
        run: |
          set -ex
          echo "Checking FlyDSL Test Results..."
          all_passed=true
          for shard in 0 1; do
            if [ ! -f flydsl-test-shard-${shard}/flydsl.xml ]; then
              echo "Test report for shard ${shard} not found."
              all_passed=false
              break
            fi
          done
          if [ "$all_passed" = true ]; then
            echo "All tests passed."
          else
            echo "Test failures or errors detected."
            exit 1
          fi
